    #done-toast .dt-main { font-size: 17px; font-weight: 700; color: #1a1a1a; margin-bottom: 5px; }
    #done-toast .dt-sub { font-size: 13px; color: #aaa; }
    .hidden { display: none !important; }

</head>

const STORAGE_KEY = 'jujutsu_sessions';
const VMEMO_KEY   = 'jujutsu_vmemos';
const FLOWCHART_KEY = 'jujutsu_flowcharts';
function POSITIONS_(){ return t('positions'); }
function RATING_LABELS_(){ return t('ratings'); }
// カスタム種別（ユーザーが追加したもの）
let customTypes = (()=>{
  try { return JSON.parse(localStorage.getItem('bjj_custom_types') || '[]'); } catch { return []; }
})();
function saveCustomTypes(){ try { localStorage.setItem('bjj_custom_types', JSON.stringify(customTypes)); } catch{} }
// 非表示にした標準種別
let hiddenTypes = (()=>{
  try { return JSON.parse(localStorage.getItem('bjj_hidden_types') || '[]'); } catch { return []; }
})();
function saveHiddenTypes(){ try { localStorage.setItem('bjj_hidden_types', JSON.stringify(hiddenTypes)); } catch{} }

function SESSION_TYPES_(){
  const defaults = t('session_types').filter(ty=>!hiddenTypes.includes(ty));
  return [...defaults, ...customTypes];
}
// 記録で使われている種別も含めた全種別（表示用・統計用）
function ALL_TYPES_(){
  const used = [...new Set(sessions.map(s=>s.type).filter(Boolean))];
  const all = [...t('session_types'), ...customTypes, ...used];
  return [...new Set(all)];
}
function countTypeUsage(name){ return sessions.filter(s=>s.type===name).length; }

function hideDefaultType(name){
  const n = countTypeUsage(name);
  if(n > 0 && !confirm(t('type_in_use_n').replace('{n}', n))) return;
  if(!hiddenTypes.includes(name)) hiddenTypes.push(name);
  saveHiddenTypes();
  openSettings();
  render();
}
function restoreDefaultType(name){
  hiddenTypes = hiddenTypes.filter(x=>x!==name);
  saveHiddenTypes();
  openSettings();
  render();
}
function addCustomType(){
  const input=document.getElementById('new-type-input');
  if(!input) return;
  const name=input.value.trim();
  if(!name){ return; }
  const all=SESSION_TYPES_();
  if(all.includes(name)){ alert(t('type_exists')); input.value=''; return; }
  customTypes.push(name);
  saveCustomTypes();
  input.value='';
  openSettings();
  render();
}
function removeCustomType(name){
  const n = countTypeUsage(name);
  if(n > 0 && !confirm(t('type_in_use_n').replace('{n}', n))) return;
  customTypes = customTypes.filter(x=>x!==name);
  saveCustomTypes();
  openSettings();
  render();
}

function cleanBrTags(){
  const fix=(v)=> typeof v==='string' ? v.replace(/<br\s*\/?>/gi, '\n') : v;
  let changed=false;
  sessions.forEach(s=>{
    ['goal','preCondition','preInjuries','content','sparringNotes','corrections','reinforcements','nextGoal','injuries'].forEach(k=>{
      if(typeof s[k]==='string' && /<br/i.test(s[k])){ s[k]=fix(s[k]); changed=true; }
    });
    (s.techniques||[]).forEach(t=>{ if(typeof t.notes==='string' && /<br/i.test(t.notes)){ t.notes=fix(t.notes); changed=true; } });
  });
  vmemos.forEach(v=>{ if(typeof v.note==='string' && /<br/i.test(v.note)){ v.note=fix(v.note); changed=true; } });
  if(changed){ save(); saveVmemos(); }
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions)); } catch{}
}
function saveVmemos() {
  try { localStorage.setItem(VMEMO_KEY, JSON.stringify(vmemos)); } catch{}
}
function saveFlowcharts() {
  try { localStorage.setItem(FLOWCHART_KEY, JSON.stringify(flowcharts)); } catch{}
}

function badge(text,cls){ return `<span class="badge ${cls}">${text}</span>`; }
function goalBox(label,text,cls){ if(!text) return ''; return `<div class="goal-box ${cls}"><div class="detail-label">${label}</div><div class="detail-value">${esc(text)}</div></div>`; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escBr(s){ return esc(s).replace(/\n/g,'<br>'); }

function getEmbedHtml(url) {
  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([\w-]+)/);
  if(yt) return `<div class="video-wrapper"><iframe src="https://www.youtube.com/embed/${yt[1]}?controls=1&modestbranding=1&rel=0" allowfullscreen></iframe></div>`;
  const gd = url.match(/drive\.google\.com\/file\/d\/([\w-]+)/);
  if(gd) return `<div class="video-wrapper"><iframe src="https://drive.google.com/file/d/${gd[1]}/preview" allowfullscreen></iframe></div>`;
  const vi = url.match(/vimeo\.com\/(\d+)/);
  if(vi) return `<div class="video-wrapper"><iframe src="https://player.vimeo.com/video/${vi[1]}" allowfullscreen></iframe></div>`;
  return null;
}

function renderCalendarHtml(year, month) {
  const monthNames=t('cal_months');
  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];

  // 練習した日をSetで管理（date文字列）
  // 日付 → その日の練習種別リスト
  const dateMarks = {};
  sessions.forEach(s=>{
    if(!dateMarks[s.date]) dateMarks[s.date]=[];
    const mark=getMarkForType(s.type);
    if(!dateMarks[s.date].includes(mark)) dateMarks[s.date].push(mark);
  });
  const trainingDates = new Set(Object.keys(dateMarks));

  // 月の最初の日・最後の日
  const firstDay = new Date(year, month, 1);
  const lastDay  = new Date(year, month+1, 0);

  // 月曜始まり：firstDayの曜日（0=日〜6=土 → 月始まりに変換）
  let startDow = firstDay.getDay(); // 0=日
  startDow = (startDow === 0) ? 6 : startDow - 1; // 月=0, 火=1, ..., 日=6

  const daysInMonth = lastDay.getDate();

  let cal = `<div class="card" style="margin-bottom:14px;padding:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <button onclick="calPrev()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#b07d3a;padding:0 8px">‹</button>
      <div style="font-weight:700;font-size:15px">${currentLang==='ja'?year+'年 '+monthNames[month]:monthNames[month]+' '+year}</div>
      <button onclick="calNext()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#b07d3a;padding:0 8px">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center">`;

  // 曜日ヘッダー（月〜日）
  const dowLabels = t('cal_dow');
  dowLabels.forEach((d, i) => {
    const color = i===5 ? '#6ea8c8' : i===6 ? '#c0504a' : '#aaa';
    cal += `<div style="font-size:11px;color:${color};padding:4px 0;font-weight:600">${d}</div>`;
  });

  // 空白セル（月曜始まりのオフセット）
  for(let i=0; i<startDow; i++){
    cal += `<div></div>`;
  }

  // 日付セル
  for(let d=1; d<=daysInMonth; d++){
    const mm = String(month+1).padStart(2,'0');
    const dd = String(d).padStart(2,'0');
    const dateStr = `${year}-${mm}-${dd}`;
    const hasTrain = trainingDates.has(dateStr);
    const isToday  = dateStr === todayStr;

    const dow = (startDow + d - 1) % 7; // 0=月〜6=日
    const textColor = dow===5 ? '#6ea8c8' : dow===6 ? '#c0504a' : '#1a1a1a';

    let cellStyle = `font-size:12px;padding:3px 0;border-radius:6px;min-height:34px;cursor:${hasTrain?'pointer':'default'}`;
    if(isToday) cellStyle += ';background:#b07d3a18;border:1.5px solid #b07d3a';

    cal += `<div style="${cellStyle}" ${hasTrain?`onclick="calDayTap('${dateStr}')"`:''}>
      <div style="color:${textColor};font-weight:${isToday?700:400}">${d}</div>
      <div style="font-size:${(dateMarks[dateStr]||[]).length>1?'9':'13'}px;line-height:1.1">${hasTrain?dateMarks[dateStr].slice(0,2).join(''):''}</div>
    </div>`;
  }

  cal += `</div></div>`;
  return cal;
}

function calPrev(){
  calendarMonth--;
  if(calendarMonth<0){ calendarMonth=11; calendarYear--; }
  renderDashboard();
}
function calNext(){
  calendarMonth++;
  if(calendarMonth>11){ calendarMonth=0; calendarYear++; }
  renderDashboard();
}

function syncDurationFromTimes(){
  const stEl=document.getElementById('f-startTime');
  const etEl=document.getElementById('f-endTime');
  if(!stEl || !etEl) return;
  const st=stEl.value;
  const et=etEl.value;
  if(st && et && st.includes(':') && et.includes(':')){
    const stParts=st.split(':');
    const etParts=et.split(':');
    const sh=parseInt(stParts[0],10), sm=parseInt(stParts[1],10);
    const eh=parseInt(etParts[0],10), em=parseInt(etParts[1],10);
    if(isNaN(sh)||isNaN(sm)||isNaN(eh)||isNaN(em)) return;
    let mins=(eh*60+em)-(sh*60+sm);
    if(mins<=0) mins+=24*60; // 日付を跨ぐ場合（深夜練習など）
    form.duration=mins;
    form.startTime=st;
    form.endTime=et;
    const durEl=document.getElementById('f-duration');
    if(durEl) durEl.value=mins;
  }
}

function savePre(){
  // フォームの現在値を同期
  const syncFields=[['f-date','date','s'],['f-type','type','s'],['f-startTime','startTime','s'],['f-endTime','endTime','s'],['f-duration','duration','n'],['f-partner','partner','s'],['f-goal','goal','s'],['f-preCondition','preCondition','s'],['f-preInjuries','preInjuries','s']];
  syncFields.forEach(([id,key,t])=>{ const el=document.getElementById(id); if(el) form[key]=t==='n'?+el.value:el.value; });
  delete form._carriedGoal;
  if(editingId){
    // 既存セッションを更新（status は pre のまま）
    sessions=sessions.map(x=>x.id===editingId?{...form,status:'pre'}:x);
  } else {
    // 新規：IDを確定させてから追加
    const newId=Date.now();
    form.id=newId;
    sessions=[{...form,status:'pre'},...sessions];
    editingId=newId;
  }
  save(); showView('list');
}
function showDoneToast(){
  const el=document.getElementById('done-toast');
  if(!el) return;
  el.querySelector('.dt-main').textContent=t('done_toast');
  el.querySelector('.dt-sub').textContent=t('done_toast_sub');
  el.classList.add('show');
  setTimeout(()=>{ el.classList.remove('show'); }, 2000);
}

function savePost(){
  // 全フィールドをIDで確実に同期
  const syncFields=[
    ['f-content','content','s'],
    ['f-sparringNotes','sparringNotes','s'],
    ['f-corrections','corrections','s'],
    ['f-reinforcements','reinforcements','s'],
    ['f-nextGoal','nextGoal','s'],
    ['f-injuries','injuries','s'],
  ];
  syncFields.forEach(([id,key])=>{ const el=document.getElementById(id); if(el) form[key]=el.value; });
  delete form._carriedGoal;
  // 技のinput値をDOMから確実に同期
  (form.techniques||[]).forEach((t,i)=>{
    const nameEl=document.getElementById('tech-name-'+i);
    const posEl=document.getElementById('tech-pos-'+i);
    const notesEl=document.getElementById('tech-notes-'+i);
    if(nameEl) t.name=nameEl.value;
    if(posEl) t.position=posEl.value;
    if(notesEl) t.notes=notesEl.value;
  });
  if(editingId){
    sessions=sessions.map(x=>x.id===editingId?{...form,status:'done'}:x);
  } else {
    const newId=Date.now();
    form.id=newId;
    sessions=[{...form,status:'done'},...sessions];
  }
  editingId=null; form=newForm(); save(); showView('list');
  showDoneToast();
}

function countNodes(nodes){
  let c=0;
  (nodes||[]).forEach(n=>{ c++; c+=countNodes(n.children); });
  return c;
}

function openFlowchart(id){ selectedFlowchartId=id; showView('flowchart-detail'); }
function getFlowchart(){ return flowcharts.find(f=>f.id===selectedFlowchartId); }

function findNode(nodes, id){
  for(const n of nodes){
    if(n.id===id) return n;
    const found=findNode(n.children, id);
    if(found) return found;
  }
  return null;
}
function findParentArray(nodes, id){
  for(const n of nodes){
    if(n.children.some(c=>c.id===id)) return n.children;
    const found=findParentArray(n.children, id);
    if(found) return found;
  }
  return null;
}

// ── グラフ図の描画 ──
function renderFlowchartGraph(fc){
  // レイアウト計算：各ノードにx,y座標を割り当てる
  const NODE_W=130, NODE_H=52, H_GAP=20, V_GAP=42;

  // ルート（開始ポジション）を仮想ノードとして扱う
  const root={ id:'__root__', actor:'pos', move:fc.startPosition||t('start'), children:fc.nodes };

  // 各サブツリーの幅を計算（葉の数ベース）
  function calcWidth(node){
    if(!node.children || !node.children.length){ node._w=NODE_W; return NODE_W; }
    let total=0;
    node.children.forEach(c=>{ total+=calcWidth(c); });
    total+=(node.children.length-1)*H_GAP;
    node._w=Math.max(NODE_W, total);
    return node._w;
  }
  calcWidth(root);

  // x,y座標を割り当て
  const positioned=[];
  function assign(node, xLeft, depth){
    const y=depth*(NODE_H+V_GAP);
    const cx=xLeft + node._w/2; // このサブツリーの中心
    node._x=cx - NODE_W/2;
    node._y=y;
    positioned.push(node);
    if(node.children && node.children.length){
      let childX=xLeft;
      // 子の合計幅がサブツリー幅より小さい場合は中央寄せ
      let childrenTotal=0;
      node.children.forEach(c=>{ childrenTotal+=c._w; });
      childrenTotal+=(node.children.length-1)*H_GAP;
      childX = cx - childrenTotal/2;
      node.children.forEach(c=>{
        assign(c, childX, depth+1);
        childX += c._w + H_GAP;
      });
    }
  }
  assign(root, 0, 0);

  // 全体サイズ
  let maxX=0, maxY=0;
  positioned.forEach(n=>{ maxX=Math.max(maxX, n._x+NODE_W); maxY=Math.max(maxY, n._y+NODE_H); });
  const totalW=maxX+20, totalH=maxY+20;

  // SVGの線
  let lines='';
  positioned.forEach(n=>{
    if(n.children){
      n.children.forEach(c=>{
        const x1=n._x+NODE_W/2, y1=n._y+NODE_H;
        const x2=c._x+NODE_W/2, y2=c._y;
        const midY=(y1+y2)/2;
        const color=c.actor==='me'?'#b07d3a':'#6ea8c8';
        lines+=`<path d="M${x1},${y1} C${x1},${midY} ${x2},${midY} ${x2},${y2}" stroke="${color}" stroke-width="2.5" fill="none" opacity="0.85"/>`;
        // 矢印
        lines+=`<polygon points="${x2-4},${y2-6} ${x2+4},${y2-6} ${x2},${y2}" fill="${color}" opacity="1"/>`;
      });
    }
  });

  // ノードのHTML（絶対配置）
  let nodesHtml='';
  positioned.forEach(n=>{
    let cls, label;
    if(n.id==='__root__'){ cls='fc-gn-pos'; label='◇ '+t('legend_pos'); }
    else if(n.actor==='me'){ cls='fc-gn-me'; label='🡅 '+t('me'); }
    else { cls='fc-gn-opp'; label='🡇 '+t('opp'); }
    nodesHtml+=`<div class="fc-graph-node ${cls}" style="left:${n._x}px;top:${n._y}px;width:${NODE_W}px;min-height:${NODE_H}px">
      <div class="fc-nlabel">${label}</div>
      <div style="font-weight:600;line-height:1.25">${esc(n.move||'—')}</div>
    </div>`;
  });

  return `<div class="fc-canvas-wrap" id="fc-canvas">
    <div class="fc-canvas-inner" id="fc-canvas-inner" style="width:${totalW}px;height:${totalH}px">
      <svg style="position:absolute;top:0;left:0;width:${totalW}px;height:${totalH}px;pointer-events:none">${lines}</svg>
      ${nodesHtml}
    </div>
  </div>
  <div style="font-size:12px;color:#aaa;text-align:center">${t('pinch_hint')}</div>`;
}

// ピンチズーム＆パンのセットアップ
let fcZoom={ scale:1, tx:20, ty:20 };
function setupPinchZoom(){
  const canvas=document.getElementById('fc-canvas');
  const inner=document.getElementById('fc-canvas-inner');
  if(!canvas || !inner) return;

  // 初期表示：全体が収まるように自動フィット
  const cw=canvas.clientWidth, ch=canvas.clientHeight;
  const iw=inner.offsetWidth, ih=inner.offsetHeight;
  const fitScale=Math.min(cw/(iw+40), ch/(ih+40), 1);
  fcZoom={ scale:fitScale, tx:(cw-iw*fitScale)/2, ty:20 };
  applyZoom();

  let startDist=0, startScale=1;
  let startX=0, startY=0, startTx=0, startTy=0;
  let mode=null; // 'pan' | 'pinch'
  let midStart={x:0,y:0};

  function dist(t1,t2){ return Math.hypot(t1.clientX-t2.clientX, t1.clientY-t2.clientY); }

  canvas.ontouchstart=(e)=>{
    if(e.touches.length===2){
      mode='pinch';
      startDist=dist(e.touches[0],e.touches[1]);
      startScale=fcZoom.scale;
      const rect=canvas.getBoundingClientRect();
      midStart={ x:(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left, y:(e.touches[0].clientY+e.touches[1].clientY)/2-rect.top };
      // ピンチ中心のcanvas内座標を基準に
      startTx=fcZoom.tx; startTy=fcZoom.ty;
    } else if(e.touches.length===1){
      mode='pan';
      startX=e.touches[0].clientX; startY=e.touches[0].clientY;
      startTx=fcZoom.tx; startTy=fcZoom.ty;
    }
  };
  canvas.ontouchmove=(e)=>{
    e.preventDefault();
    if(mode==='pinch' && e.touches.length===2){
      const d=dist(e.touches[0],e.touches[1]);
      let newScale=startScale*(d/startDist);
      newScale=Math.max(0.2, Math.min(3, newScale));
      // ピンチ中心を固定してズーム
      const ratio=newScale/startScale;
      fcZoom.tx = midStart.x - (midStart.x - startTx)*ratio;
      fcZoom.ty = midStart.y - (midStart.y - startTy)*ratio;
      fcZoom.scale=newScale;
      applyZoom();
    } else if(mode==='pan' && e.touches.length===1){
      fcZoom.tx = startTx + (e.touches[0].clientX-startX);
      fcZoom.ty = startTy + (e.touches[0].clientY-startY);
      applyZoom();
    }
  };
  canvas.ontouchend=(e)=>{
    if(e.touches.length===0) mode=null;
    else if(e.touches.length===1){ mode='pan'; startX=e.touches[0].clientX; startY=e.touches[0].clientY; startTx=fcZoom.tx; startTy=fcZoom.ty; }
  };
}

function applyZoom(){
  const inner=document.getElementById('fc-canvas-inner');
  if(inner) inner.style.transform=`translate(${fcZoom.tx}px,${fcZoom.ty}px) scale(${fcZoom.scale})`;
}

function renderNodes(nodes){
  if(!nodes || !nodes.length) return '';
  let html='';
  nodes.forEach(n=>{
    const actorClass=n.actor==='me'?'me':'opp';
    const actorBadge=n.actor==='me'?`<span class="fc-actor-badge fc-actor-me">${t('me')}</span>`:`<span class="fc-actor-badge fc-actor-opp">${t('opp')}</span>`;
    html+=`<div class="fc-node ${actorClass}">
      <div style="margin-bottom:6px">${actorBadge}</div>
      <input type="text" value="${esc(n.move)}" placeholder="${t('move_placeholder')}" oninput="updateNode(${n.id},'move',this.value)" style="font-size:14px;margin-bottom:4px" />
      <input type="text" value="${esc(n.notes)}" placeholder="${t('notes_optional')}" oninput="updateNode(${n.id},'notes',this.value)" style="font-size:13px;color:#666" />
      <div class="flex-row" style="margin-top:8px;gap:6px">
        <button class="btn-secondary btn-sm accent" onclick="addNode(${n.id},'me')">${t('add_me')}</button>
        <button class="btn-secondary btn-sm blue" onclick="addNode(${n.id},'opp')">${t('add_opp')}</button>
        <button class="btn-danger" style="padding:5px 10px;font-size:11px" onclick="deleteNode(${n.id})">${t('delete')}</button>
      </div>
      ${n.children && n.children.length?`<div class="fc-children">${renderNodes(n.children)}</div>`:''}
    </div>`;
  });
  return html;
}

function updateFlowchartField(field, value){
  const fc=getFlowchart(); if(!fc) return;
  fc[field]=value;
  saveFlowcharts();
}
function updateNode(nodeId, field, value){
  const fc=getFlowchart(); if(!fc) return;
  const node=findNode(fc.nodes, nodeId);
  if(node){ node[field]=value; saveFlowcharts(); }
}
function addNode(parentId, actor){
  const fc=getFlowchart(); if(!fc) return;
  const node=newNode(actor);
  if(parentId===null){ fc.nodes.push(node); }
  else { const parent=findNode(fc.nodes, parentId); if(parent) parent.children.push(node); }
  saveFlowcharts();
  renderFlowchartDetail();
}
function deleteNode(nodeId){
  const fc=getFlowchart(); if(!fc) return;
  if(!confirm(t('confirm_delete_node'))) return;
  const rootIdx=fc.nodes.findIndex(n=>n.id===nodeId);
  if(rootIdx>=0){ fc.nodes.splice(rootIdx,1); }
  else { const arr=findParentArray(fc.nodes, nodeId); if(arr){ const i=arr.findIndex(n=>n.id===nodeId); if(i>=0) arr.splice(i,1); } }
  saveFlowcharts();
  renderFlowchartDetail();
}
function deleteFlowchart(id){
  if(!confirm(t('confirm_delete_flowchart'))) return;
  flowcharts=flowcharts.filter(f=>f.id!==id);
  saveFlowcharts();
  showView('flowchart');
}

function setStatsTab(tab){ statsTab=tab; renderStats(); }

// ① 練習時間グラフ（棒グラフ）
function renderStatsTime(done){
  const now=new Date();
  let buckets=[], labels=[];
  if(statsTimeRange==='weekly'){
    // 直近8週
    for(let i=7;i>=0;i--){
      const d=new Date(now); d.setDate(now.getDate()-i*7);
      const {start,end}=weekRange(d);
      const mins=done.filter(s=>{ const sd=new Date(s.date); return sd>=start && sd<=end; }).reduce((a,b)=>a+(b.duration||0),0);
      buckets.push(Math.round(mins/60*10)/10);
      labels.push(`${start.getMonth()+1}/${start.getDate()}`);
    }
  } else {
    // 直近6ヶ月
    for(let i=5;i>=0;i--){
      const d=new Date(now.getFullYear(), now.getMonth()-i, 1);
      const y=d.getFullYear(), m=d.getMonth();
      const mins=done.filter(s=>{ const sd=new Date(s.date); return sd.getFullYear()===y && sd.getMonth()===m; }).reduce((a,b)=>a+(b.duration||0),0);
      buckets.push(Math.round(mins/60*10)/10);
      labels.push(t('cal_months')[m]);
    }
  }
  let html=`<div class="sub-toggle">
    <button class="${statsTimeRange==='weekly'?'active':''}" onclick="setStatsTimeRange('weekly')">${t('stats_weekly')}</button>
    <button class="${statsTimeRange==='monthly'?'active':''}" onclick="setStatsTimeRange('monthly')">${t('stats_monthly')}</button>
  </div>`;
  html += `<div class="card">${barChartSvg(buckets, labels, t('stats_hours'))}</div>`;
  return html;
}

function weekRange(date){
  const d=new Date(date);
  let dow=d.getDay(); dow=(dow===0)?6:dow-1; // 月曜始まり
  const start=new Date(d); start.setDate(d.getDate()-dow); start.setHours(0,0,0,0);
  const end=new Date(start); end.setDate(start.getDate()+6); end.setHours(23,59,59,999);
  return {start,end};
}

function barChartSvg(values, labels, unit){
  const W=320, H=200, padL=30, padB=30, padT=10;
  const max=Math.max(...values, 1);
  const chartW=W-padL-10, chartH=H-padB-padT;
  const barW=chartW/values.length*0.6, gap=chartW/values.length;
  let bars='', xlabels='';
  values.forEach((v,i)=>{
    const bh=(v/max)*chartH;
    const x=padL + i*gap + (gap-barW)/2;
    const y=padT+chartH-bh;
    bars+=`<rect x="${x}" y="${y}" width="${barW}" height="${bh}" rx="3" fill="#b07d3a"/>`;
    if(v>0) bars+=`<text x="${x+barW/2}" y="${y-4}" font-size="9" fill="#666" text-anchor="middle">${v}</text>`;
    xlabels+=`<text x="${x+barW/2}" y="${H-padB+14}" font-size="9" fill="#999" text-anchor="middle">${labels[i]}</text>`;
  });
  // Y軸目盛り
  let yaxis='';
  for(let g=0;g<=2;g++){
    const val=(max/2*g).toFixed(max<5?1:0);
    const y=padT+chartH-(g/2)*chartH;
    yaxis+=`<line x1="${padL}" y1="${y}" x2="${W-10}" y2="${y}" stroke="#eee" stroke-width="1"/>`;
    yaxis+=`<text x="${padL-4}" y="${y+3}" font-size="8" fill="#bbb" text-anchor="end">${val}</text>`;
  }
  return `<div style="font-size:11px;color:#aaa;margin-bottom:6px">${unit}</div><svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${yaxis}${bars}${xlabels}</svg>`;
}

// ② 技・ポジションランキング
function renderStatsRanking(done){
  const map={};
  done.forEach(s=>{
    (s.techniques||[]).forEach(tk=>{
      if(statsRankMode==='tech'){
        if(!tk.name) return;
        map[tk.name]=(map[tk.name]||0)+1;
      } else {
        if(!tk.position) return;
        map[tk.position]=(map[tk.position]||0)+1;
      }
    });
  });
  const ranked=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,10);
  let html=`<div class="sub-toggle">
    <button class="${statsRankMode==='tech'?'active':''}" onclick="setStatsRankMode('tech')">${t('stats_by_tech')}</button>
    <button class="${statsRankMode==='position'?'active':''}" onclick="setStatsRankMode('position')">${t('stats_by_position')}</button>
  </div>`;
  if(!ranked.length){
    html+=`<div class="card" style="text-align:center;padding:24px;color:#aaa;font-size:14px">${t('stats_no_data')}</div>`;
    return html;
  }
  const max=ranked[0][1];
  html+=`<div class="card">`;
  ranked.forEach(([name,count],i)=>{
    const pct=(count/max)*100;
    html+=`<div class="rank-row">
      <div class="rank-num" style="background:${i<3?'#b07d3a':'#ccc'}">${i+1}</div>
      <div class="rank-bar-wrap"><div class="rank-bar-bg">
        <div class="rank-bar-fill" style="width:${pct}%"></div>
        <div class="rank-label">${esc(name)}</div>
        <div class="rank-count">${count}</div>
      </div></div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

// ③ コンディション推移（折れ線）
function renderStatsCondition(done){
  const sorted=[...done].filter(s=>s.rating).sort((a,b)=>a.date.localeCompare(b.date)).slice(-20);
  if(!sorted.length) return `<div class="card" style="text-align:center;padding:24px;color:#aaa;font-size:14px">${t('stats_no_data')}</div>`;
  const values=sorted.map(s=>s.rating);
  const labels=sorted.map(s=>{ const d=new Date(s.date); return `${d.getMonth()+1}/${d.getDate()}`; });
  const avg=(values.reduce((a,b)=>a+b,0)/values.length).toFixed(1);
  let html=`<div class="card" style="margin-bottom:10px;text-align:center"><span style="font-size:12px;color:#aaa">${t('stats_avg_condition')}</span><div style="font-size:28px;font-weight:700;color:#b07d3a">${avg}</div></div>`;
  html+=`<div class="card">${lineChartSvg(values,labels)}</div>`;
  return html;
}

function lineChartSvg(values, labels){
  const W=320,H=200,padL=24,padB=30,padT=10;
  const chartW=W-padL-10, chartH=H-padB-padT;
  const max=5, min=1;
  const pts=values.map((v,i)=>{
    const x=padL + (values.length===1?chartW/2:(i/(values.length-1))*chartW);
    const y=padT+chartH-((v-min)/(max-min))*chartH;
    return {x,y,v};
  });
  let grid='';
  for(let g=1;g<=5;g++){
    const y=padT+chartH-((g-min)/(max-min))*chartH;
    grid+=`<line x1="${padL}" y1="${y}" x2="${W-10}" y2="${y}" stroke="#eee" stroke-width="1"/>`;
    grid+=`<text x="${padL-4}" y="${y+3}" font-size="8" fill="#bbb" text-anchor="end">${g}</text>`;
  }
  let path=pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
  let dots=pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3" fill="#b07d3a"/>`).join('');
  // ラベルは間引き
  let xlabels='';
  const step=Math.ceil(pts.length/6);
  pts.forEach((p,i)=>{ if(i%step===0) xlabels+=`<text x="${p.x}" y="${H-padB+14}" font-size="8" fill="#999" text-anchor="middle">${labels[i]}</text>`; });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${grid}<path d="${path}" stroke="#b07d3a" stroke-width="2" fill="none"/>${dots}${xlabels}</svg>`;
}

// ④ 種別内訳（ドーナツ）
function renderStatsBreakdown(done){
  const map={};
  done.forEach(s=>{ const k=s.type||'—'; map[k]=(map[k]||0)+1; });
  const entries=Object.entries(map).sort((a,b)=>b[1]-a[1]);
  const total=done.length;
  const colors=['#b07d3a','#6ea8c8','#6ea88a','#c8a05a','#c0504a','#9b7acc','#d98a2b','#5c93b3'];
  let html=`<div class="card">${donutSvg(entries,total,colors)}`;
  html+=`<div style="margin-top:14px">`;
  entries.forEach(([name,count],i)=>{
    const pct=Math.round(count/total*100);
    html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div style="width:12px;height:12px;border-radius:3px;background:${colors[i%colors.length]}"></div>
      <div style="flex:1;font-size:13px">${esc(name)}</div>
      <div style="font-size:12px;color:#666">${count} (${pct}%)</div>
    </div>`;
  });
  html+=`</div></div>`;
  return html;
}

function donutSvg(entries, total, colors){
  const size=180, cx=size/2, cy=size/2, r=65, sw=28;
  const circ=2*Math.PI*r;
  let offset=0, arcs='';
  entries.forEach(([name,count],i)=>{
    const frac=count/total;
    const len=frac*circ;
    arcs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${colors[i%colors.length]}" stroke-width="${sw}" stroke-dasharray="${len} ${circ-len}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset+=len;
  });
  return `<svg viewBox="0 0 ${size} ${size}" style="width:180px;height:180px;display:block;margin:0 auto">${arcs}<text x="${cx}" y="${cy-4}" font-size="26" font-weight="700" fill="#1a1a1a" text-anchor="middle">${total}</text><text x="${cx}" y="${cy+16}" font-size="11" fill="#aaa" text-anchor="middle">sessions</text></svg>`;
}

let searchQuery = '';

  renderSearchResults();

function hl(text, q){
  if(!q) return esc(text);
  const escaped=esc(text);
  try {
    const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    return escaped.replace(re,'<mark>$1</mark>');
  } catch { return escaped; }
}

function matches(text, q){
  if(!text) return false;
  return String(text).toLowerCase().includes(q.toLowerCase());
}

function renderSearchResults(){
  const el=document.getElementById('search-results');
  if(!el) return;
  const q=searchQuery.trim();
  if(!q){
    el.innerHTML=`<div style="text-align:center;padding:40px;color:#aaa;font-size:14px">🔍<br><br>${t('search_hint')}</div>`;
    return;
  }

  // 1. 練習記録を検索（目標・内容・メモ・振り返り・相手・種別・タグ）
  const recHits = sessions.filter(s=>
    matches(s.goal,q) || matches(s.content,q) || matches(s.sparringNotes,q) ||
    matches(s.corrections,q) || matches(s.reinforcements,q) || matches(s.nextGoal,q) ||
    matches(s.preCondition,q) || matches(s.preInjuries,q) || matches(s.injuries,q) ||
    matches(s.partner,q) || matches(s.type,q) || matches(s.date,q) ||
    (s.tags||[]).some(tg=>matches(tg,q)) ||
    (s.techniques||[]).some(tk=>matches(tk.name,q)||matches(tk.notes,q)||matches(tk.position,q))
  );

  // 2. 技を検索（技ライブラリ相当）
  const techMap={};
  sessions.forEach(s=>{
    (s.techniques||[]).forEach(tk=>{
      if(!tk.name) return;
      if(matches(tk.name,q)||matches(tk.notes,q)||matches(tk.position,q)){
        if(!techMap[tk.name]) techMap[tk.name]={name:tk.name,count:0};
        techMap[tk.name].count++;
      }
    });
  });
  const techHits=Object.values(techMap).sort((a,b)=>b.count-a.count);

  // 3. 動画メモを検索
  const vidHits = vmemos.filter(v=>
    matches(v.title,q)||matches(v.note,q)||matches(v.category,q)||matches(v.url,q)
  );

  // 4. フローチャートを検索（タイトル・開始ポジション・ノード）
  function nodeMatches(nodes){
    return (nodes||[]).some(n=> matches(n.move,q)||matches(n.notes,q)||nodeMatches(n.children));
  }
  const fcHits = flowcharts.filter(fc=>
    matches(fc.title,q)||matches(fc.startPosition,q)||nodeMatches(fc.nodes)
  );

  const total = recHits.length + techHits.length + vidHits.length + fcHits.length;
  if(total===0){
    el.innerHTML=`<div style="text-align:center;padding:40px;color:#aaa;font-size:14px">${t('search_no_result')}</div>`;
    return;
  }

  let html=`<div style="font-size:12px;color:#aaa;margin-bottom:14px">${total} ${t('search_results')}</div>`;

  // 練習記録
  if(recHits.length){
    html+=`<div class="search-group"><p class="section-title">${t('search_records')}<span class="search-count">${recHits.length}</span></p>`;
    recHits.forEach(s=>{
      // ヒットしたスニペットを探す
      let snippet='';
      const fields=[s.goal,s.content,s.sparringNotes,s.corrections,s.reinforcements,s.nextGoal];
      for(const f of fields){ if(matches(f,q)){ snippet=f; break; } }
      if(!snippet){
        const tk=(s.techniques||[]).find(x=>matches(x.name,q)||matches(x.notes,q));
        if(tk) snippet=tk.name+(tk.notes?' — '+tk.notes:'');
      }
      html+=`<div class="session-item" onclick="openDetail(${s.id})">
        <div class="session-date">${esc(s.date)}</div>
        <div class="session-type">${hl(s.type||'',q)} <span class="session-meta">— ${s.duration}min</span></div>
        ${snippet?`<div style="font-size:13px;color:#666;margin-top:5px;line-height:1.4">${hl(snippet.slice(0,90),q)}${snippet.length>90?'…':''}</div>`:''}
      </div>`;
    });
    html+=`</div>`;
  }

  // 技
  if(techHits.length){
    html+=`<div class="search-group"><p class="section-title">${t('search_techniques')}<span class="search-count">${techHits.length}</span></p>`;
    techHits.forEach(tv=>{
      html+=`<div class="tech-item" onclick="openTechDetail('${esc(tv.name)}')">
        <div class="flex-between">
          <div><div class="tech-name">${hl(tv.name,q)}</div><div class="tech-count">${tv.count}${t('times_practiced')}</div></div>
          <span style="font-size:11px;color:#b07d3a">${t('open')}</span>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  // 動画メモ
  if(vidHits.length){
    html+=`<div class="search-group"><p class="section-title">${t('search_videos')}<span class="search-count">${vidHits.length}</span></p>`;
    vidHits.forEach(v=>{
      html+=`<div class="session-item" onclick="showView('videos')">
        <div class="session-type">${hl(v.title||v.url||'',q)}</div>
        ${v.category?`<div style="margin-top:4px">${badge(hl(v.category,q),'badge-purple')}</div>`:''}
        ${v.note&&matches(v.note,q)?`<div style="font-size:13px;color:#666;margin-top:5px">${hl(v.note.slice(0,90),q)}${v.note.length>90?'…':''}</div>`:''}
      </div>`;
    });
    html+=`</div>`;
  }

  // フローチャート
  if(fcHits.length){
    html+=`<div class="search-group"><p class="section-title">${t('search_flowcharts')}<span class="search-count">${fcHits.length}</span></p>`;
    fcHits.forEach(fc=>{
      html+=`<div class="session-item" onclick="openFlowchart(${fc.id})">
        <div class="session-type">${hl(fc.title||t('untitled'),q)}</div>
        ${fc.startPosition?`<div style="font-size:13px;color:#6ea88a;margin-top:3px">▶ ${hl(fc.startPosition,q)}</div>`:''}
      </div>`;
    });
    html+=`</div>`;
  }

  el.innerHTML=html;
}

// 日付を検出する（7/10, 2026/7/10, 7月10日, 07-10 など）
function parseDateFromLine(line){
  const year=new Date().getFullYear();
  // 2026/7/10 or 2026-07-10
  let m=line.match(/(20\d{2})[\/\-年](\d{1,2})[\/\-月](\d{1,2})/);
  if(m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  // 7/10 or 7-10 or 7月10日
  m=line.match(/(?:^|\s)(\d{1,2})[\/\-月](\d{1,2})日?(?:\s|$|\D)/);
  if(m){
    const mo=+m[1], d=+m[2];
    if(mo>=1&&mo<=12&&d>=1&&d<=31) return `${year}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }
  return null;
}

// 練習時間を検出（60分, 60min, 1時間半 など）
function parseDurationFromText(text){
  let m=text.match(/(\d+)\s*(?:分|min)/i);
  if(m) return +m[1];
  m=text.match(/(\d+)\s*(?:時間|hr|hour)/i);
  if(m) return +m[1]*60;
  return null;
}

// 種別を検出
function parseTypeFromText(text){
  const types=SESSION_TYPES_();
  const lower=text.toLowerCase();
  // カスタム種別を優先して判定（ユーザーが追加した名前がそのまま含まれていれば採用）
  for(const ct of customTypes){
    if(lower.includes(ct.toLowerCase())) return ct;
  }
  // 標準種別のキーワード判定
  const kw=[
    {k:['スパー','sparring','spar','rola'], t:0},
    {k:['クラス','class','aula'], t:1},
    {k:['テクニック','technique','técnica'], t:2},
    {k:['ドリル','drill'], t:3},
    {k:['試合','competition','competição'], t:4},
    {k:['セルフ','solo'], t:5},
    {k:['ノーギ','no-gi','nogi'], t:6},
    {k:['筋トレ','strength','musculação','weight'], t:7},
    {k:['hiit','インターバル'], t:8},
  ];
  for(const {k,t:idx} of kw){
    if(k.some(x=>lower.includes(x.toLowerCase())) && types[idx]) return types[idx];
  }
  return types[0];
}

function analyzeImport(){
  const el=document.getElementById('import-text');
  if(el) importText=el.value;
  const text=importText.trim();
  if(!text){ alert(t('import_empty')); return; }

  // 空行で大きく分割
  const blocks=text.split(/\n\s*\n/).map(b=>b.trim()).filter(Boolean);
  importParsed=[];

  blocks.forEach(block=>{
    const lines=block.split('\n');
    let date=null, contentLines=[];
    // 各行で日付を探す（最初に見つかったものを採用）
    lines.forEach((line,idx)=>{
      const d=parseDateFromLine(line);
      if(d && !date){
        date=d;
        // 日付行から日付部分を除いた残りも内容として拾う
        const rest=line.replace(/(20\d{2})?[\/\-年]?\d{1,2}[\/\-月]\d{1,2}日?/,'').trim();
        if(rest) contentLines.push(rest);
      } else {
        contentLines.push(line);
      }
    });
    const content=contentLines.join('\n').trim();
    importParsed.push({
      date: date,
      content: content,
      duration: parseDurationFromText(block) || 60,
      type: parseTypeFromText(block),
    });
  });

  if(!importParsed.length){ alert(t('import_empty')); return; }
  importStep='preview';
  renderImport();
}

function confirmImport(){
  const today=new Date().toISOString().split('T')[0];
  let count=0;
  importParsed.forEach(rec=>{
    const s=newForm();
    s.id=Date.now()+Math.floor(Math.random()*10000);
    s.date=rec.date||today;
    s.type=rec.type;
    s.duration=rec.duration||60;
    s.content=rec.content;
    s.status='done';
    sessions=[s,...sessions];
    count++;
  });
  // 日付降順で並べ替え
  sessions.sort((a,b)=>b.date.localeCompare(a.date));
  save();
  alert(`${count} ${t('import_done')}`);
  importText=''; importParsed=[]; importStep='input';
  showView('list');
}

  let html = `<div style="font-size:12px;color:#aaa;margin:8px 0 10px;line-height:1.5">${t('types_hint')}</div>`;

  const typeRow = (ty, isCustom)=>{
    const n = countTypeUsage(ty);
    const usage = n>0 ? `<span style="font-size:11px;color:#aaa;margin-left:6px">${t('type_used_count').replace('{n}', n)}</span>` : '';
    const fn = isCustom ? `removeCustomType('${esc(ty)}')` : `hideDefaultType('${esc(ty)}')`;
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 11px;border:1px solid ${isCustom?'#b07d3a33':'#eee'};background:${isCustom?'#b07d3a0a':'#fafafa'};border-radius:6px;margin-bottom:5px">
      <span style="font-size:13px">${esc(ty)}${usage}</span>
      <button class="btn-danger" style="padding:3px 9px;font-size:11px" onclick="${fn}">${t('delete')}</button>
    </div>`;
  };

  // 標準の種別（削除可）
  if(visibleDefaults.length){
    html += `<div style="font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px">${t('type_default')}</div>`;
    html += `<div style="margin-bottom:14px">${visibleDefaults.map(ty=>typeRow(ty,false)).join('')}</div>`;
  }

  // 追加した種別
  if(customTypes.length){
    html += `<div style="font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px">${t('type_custom')}</div>`;
    html += `<div style="margin-bottom:14px">${customTypes.map(ty=>typeRow(ty,true)).join('')}</div>`;
  }

  // 非表示にした標準種別（復元可）
  if(hiddenDefaults.length){
    html += `<div style="font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px">${t('type_hidden')}</div>`;
    html += `<div style="margin-bottom:14px">`;
    hiddenDefaults.forEach(ty=>{
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 11px;border:1px dashed #ddd;background:#fafafa;border-radius:6px;margin-bottom:5px;opacity:0.7">
        <span style="font-size:13px;color:#aaa">${esc(ty)}</span>
        <button class="btn-secondary" style="padding:3px 9px;font-size:11px" onclick="restoreDefaultType('${esc(ty)}')">${t('type_restore')}</button>
      </div>`;
    });
    html += `</div>`;
  }

  // 追加フォーム
  html += `<div style="display:flex;gap:6px">
    <input type="text" id="new-type-input" placeholder="${t('type_add_placeholder')}" style="flex:1;font-size:14px" onkeydown="if(event.key==='Enter'){event.preventDefault();addCustomType();}" />
    <button class="btn-primary" style="padding:10px 16px;font-size:13px" onclick="addCustomType()">${t('add')}</button>
  </div>`;
  return html;
}

function exportData(){
  const data = {
    version: 2,
    exportedAt: new Date().toISOString(),
    lang: currentLang,
    sessions: sessions,
    vmemos: vmemos,
    flowcharts: flowcharts,
    customTypes: customTypes,
    hiddenTypes: hiddenTypes,
    typeMarks: typeMarks,
    fieldSettings: fieldSettings,
    carryOverGoal: carryOverGoal,
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().split('T')[0];
  a.href = url;
  a.download = `bjj-log-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  alert(t('backup_export_done'));
}

function importData(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    try {
      const data = JSON.parse(e.target.result);
      if(!data || (!data.sessions && !data.vmemos && !data.flowcharts)) throw new Error('invalid');
      if(!confirm(t('backup_import_confirm'))) { input.value=''; return; }
      sessions   = Array.isArray(data.sessions)   ? data.sessions   : [];
      vmemos     = Array.isArray(data.vmemos)     ? data.vmemos     : [];
      flowcharts = Array.isArray(data.flowcharts) ? data.flowcharts : [];
      if(Array.isArray(data.customTypes)) { customTypes = data.customTypes; saveCustomTypes(); }
      if(Array.isArray(data.hiddenTypes)) { hiddenTypes = data.hiddenTypes; saveHiddenTypes(); }
      if(data.typeMarks && typeof data.typeMarks==='object') { typeMarks = data.typeMarks; saveTypeMarks(); }
      if(data.fieldSettings && typeof data.fieldSettings==='object') { fieldSettings = { ...FIELD_DEFAULTS, ...data.fieldSettings }; saveFieldSettings(); }
      if(typeof data.carryOverGoal==='boolean') { carryOverGoal = data.carryOverGoal; localStorage.setItem('bjj_carry_goal', String(carryOverGoal)); }
      save(); saveVmemos(); saveFlowcharts();
      cleanBrTags();
      alert(t('backup_import_done'));
      closeModal();
      showView('dashboard');
    } catch(err) {
      alert(t('backup_import_error'));
    }
    input.value='';
  };
  reader.onerror = ()=>{ alert(t('backup_import_error')); input.value=''; };
  reader.readAsText(file);
}

// ── 画像描画 ──
function renderShareCanvas(){
  const W = 1080;
  const H = shareFormat==='story' ? 1920 : 1080;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const x = c.getContext('2d');
  const belt = getBelt();

  // 背景：生成りの紙
  x.fillStyle = '#faf7f2';
  x.fillRect(0,0,W,H);

  // マットの目地
  x.strokeStyle = 'rgba(26,26,26,0.028)';
  x.lineWidth = 1;
  const grid = 54;
  for(let gx=0; gx<W; gx+=grid){ x.beginPath(); x.moveTo(gx,0); x.lineTo(gx,H); x.stroke(); }
  for(let gy=0; gy<H; gy+=grid){ x.beginPath(); x.moveTo(0,gy); x.lineTo(W,gy); x.stroke(); }

  // 署名要素：左端の帯（選択色 + 黒バー）
  const beltW = shareFormat==='story' ? 30 : 24;
  x.fillStyle = belt.main;
  x.fillRect(0,0,beltW,H);
  // 白帯など明るい色は境界線を入れる
  if(belt.id==='white'){
    x.strokeStyle = 'rgba(26,26,26,0.12)';
    x.lineWidth = 2;
    x.beginPath(); x.moveTo(beltW,0); x.lineTo(beltW,H); x.stroke();
  }
  // 帯のバー（黒帯の赤バーなど）
  const barTop = shareFormat==='story' ? H*0.60 : H*0.58;
  const barH = shareFormat==='story' ? 240 : 165;
  x.fillStyle = belt.bar;
  x.fillRect(0, barTop, beltW, barH);

  if(shareMode==='session')      drawSessionCard(x, W, H, belt);
  else if(shareMode==='week')    drawWeekCard(x, W, H, belt);
  else                           drawStatsCard(x, W, H, belt);

  return c;
}

function fitText(x, text, maxW, startSize, font, minSize){
  let size = startSize;
  x.font = font.replace('{s}', size);
  while(x.measureText(text).width > maxW && size > minSize){
    size -= 2;
    x.font = font.replace('{s}', size);
  }
  return size;
}

// ── 単一セッション：時刻を主役に ──
function drawSessionCard(x, W, H, belt){
  const s = sessions.find(v=>v.id===shareSessionId);
  if(!s) return;
  const isStory = shareFormat==='story';
  const padL = isStory ? 108 : 88;
  const padR = W - (isStory ? 84 : 70);
  const contentW = padR - padL;
  let y = isStory ? 210 : 140;

  // 日付
  x.fillStyle = '#a8a29a';
  x.font = `500 ${isStory?30:26}px -apple-system, "Helvetica Neue", sans-serif`;
  const d = new Date(s.date);
  const dateStr = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  drawTracked(x, dateStr, padL, y, isStory?7:6);
  y += isStory ? 66 : 52;

  // 種別
  x.fillStyle = '#1a1a1a';
  const typeSize = fitText(x, s.type||'', contentW, isStory?76:60, `800 {s}px -apple-system, "Helvetica Neue", sans-serif`, 38);
  x.font = `800 ${typeSize}px -apple-system, "Helvetica Neue", sans-serif`;
  x.fillText(s.type||'', padL, y);
  y += isStory ? 36 : 26;

  // 区切り線
  x.strokeStyle = '#1a1a1a';
  x.lineWidth = 3;
  x.beginPath(); x.moveTo(padL, y); x.lineTo(padL + (isStory?120:96), y); x.stroke();
  y += isStory ? 96 : 74;

  // ── 主役：開始 → 終了時刻 ──
  if(s.startTime && s.endTime){
    const timeSize = isStory ? 152 : 112;
    x.font = `800 ${timeSize}px -apple-system, "Helvetica Neue", sans-serif`;
    x.fillStyle = belt.text;
    x.fillText(s.startTime, padL, y + timeSize*0.74);
    const sw = x.measureText(s.startTime).width;

    // 縦の区切り（矢印の代わりに帯色の細いバー）
    const dashX = padL + sw + (isStory?34:26);
    x.fillStyle = '#d6cec2';
    x.fillRect(dashX, y + timeSize*0.42, isStory?46:34, isStory?7:5);

    // 終了時刻を次の行に大きく
    y += isStory ? 152 : 112;
    x.fillStyle = belt.text;
    x.font = `800 ${timeSize}px -apple-system, "Helvetica Neue", sans-serif`;
    x.fillText(s.endTime, padL, y + timeSize*0.74);
    y += isStory ? 178 : 132;

    // 合計時間は控えめに添える
    x.fillStyle = '#a8a29a';
    x.font = `700 ${isStory?26:21}px -apple-system, "Helvetica Neue", sans-serif`;
    drawTracked(x, t('share_mat_time'), padL, y, isStory?7:6);
    y += isStory ? 46 : 36;
    x.fillStyle = '#1a1a1a';
    x.font = `700 ${isStory?52:40}px -apple-system, "Helvetica Neue", sans-serif`;
    const hh = Math.floor(s.duration/60), mm = s.duration%60;
    x.fillText(hh>0 ? `${hh}h ${mm>0?mm+'m':''}`.trim() : `${mm}m`, padL, y);
    y += isStory ? 72 : 56;
  } else {
    // 時刻がない場合は合計時間を主役に
    const hrs = Math.floor(s.duration/60), mins = s.duration%60;
    const timeStr = hrs>0 ? `${hrs}:${String(mins).padStart(2,'0')}` : `${mins}`;
    const unit = hrs>0 ? 'HRS' : 'MIN';
    x.fillStyle = belt.text;
    x.font = `800 ${isStory?200:150}px -apple-system, "Helvetica Neue", sans-serif`;
    x.fillText(timeStr, padL, y + (isStory?150:112));
    const tw = x.measureText(timeStr).width;
    x.fillStyle = '#1a1a1a';
    x.font = `700 ${isStory?38:30}px -apple-system, "Helvetica Neue", sans-serif`;
    x.fillText(unit, padL + tw + (isStory?20:16), y + (isStory?150:112));
    y += isStory ? 210 : 160;
  }

  y += isStory ? 24 : 16;

  // 技リスト
  const techs = (s.techniques||[]).map(tk=>tk.name).filter(Boolean);
  if(techs.length){
    x.fillStyle = '#a8a29a';
    x.font = `700 ${isStory?24:20}px -apple-system, "Helvetica Neue", sans-serif`;
    drawTracked(x, t('share_techniques'), padL, y, isStory?6:5);
    y += isStory ? 52 : 42;
    const maxShow = isStory ? 5 : 3;
    techs.slice(0, maxShow).forEach(name=>{
      x.font = `600 ${isStory?38:31}px -apple-system, "Helvetica Neue", sans-serif`;
      x.fillStyle = belt.text;
      x.fillRect(padL, y - (isStory?13:10), isStory?20:16, 3);
      x.fillStyle = '#1a1a1a';
      let nm = name;
      if(x.measureText(nm).width > contentW - (isStory?42:34)){
        while(x.measureText(nm+'…').width > contentW - (isStory?42:34) && nm.length>1) nm = nm.slice(0,-1);
        nm += '…';
      }
      x.fillText(nm, padL + (isStory?42:34), y);
      y += isStory ? 56 : 44;
    });
    if(techs.length > maxShow){
      x.fillStyle = '#a8a29a';
      x.font = `500 ${isStory?30:24}px -apple-system, "Helvetica Neue", sans-serif`;
      x.fillText(`+${techs.length-maxShow}`, padL + (isStory?42:34), y);
    }
  }

  drawFooter(x, W, H);
}

// ── 週間：スケジュール型 ──
function drawWeekCard(x, W, H, belt){
  const isStory = shareFormat==='story';
  const padL = isStory ? 108 : 88;
  const padR = W - (isStory ? 84 : 70);
  const contentW = padR - padL;
  let y = isStory ? 210 : 140;

  // 今週の範囲（月曜始まり）
  const now = new Date();
  let dow = now.getDay(); dow = (dow===0)?6:dow-1;
  const monday = new Date(now); monday.setDate(now.getDate()-dow); monday.setHours(0,0,0,0);
  const sunday = new Date(monday); sunday.setDate(monday.getDate()+6); sunday.setHours(23,59,59,999);

  const weekSessions = sessions.filter(s=>{
    const d = new Date(s.date);
    return d>=monday && d<=sunday && s.status==='done';
  }).sort((a,b)=>a.date.localeCompare(b.date));

  const totalMin = weekSessions.reduce((a,b)=>a+(b.duration||0),0);
  const hrs = Math.floor(totalMin/60), mins = totalMin%60;
  const trainDays = new Set(weekSessions.map(s=>s.date)).size;

  // ヘッダー
  x.fillStyle = '#a8a29a';
  x.font = `700 ${isStory?26:22}px -apple-system, "Helvetica Neue", sans-serif`;
  drawTracked(x, t('share_week_label'), padL, y, isStory?8:7);
  y += isStory ? 58 : 46;

  x.fillStyle = '#1a1a1a';
  x.font = `800 ${isStory?66:52}px -apple-system, "Helvetica Neue", sans-serif`;
  const mLabel = `${monday.getMonth()+1}/${monday.getDate()} — ${sunday.getMonth()+1}/${sunday.getDate()}`;
  x.fillText(mLabel, padL, y);
  y += isStory ? 34 : 26;

  x.strokeStyle = '#1a1a1a';
  x.lineWidth = 3;
  x.beginPath(); x.moveTo(padL, y); x.lineTo(padL + (isStory?120:96), y); x.stroke();
  y += isStory ? 84 : 64;

  // 日別リスト（スケジュール型）
  const dowLabels = t('cal_dow');
  const maxRows = isStory ? 7 : 5;
  let shown = 0;
  for(let i=0; i<7 && shown<maxRows; i++){
    const day = new Date(monday); day.setDate(monday.getDate()+i);
    const ds = `${day.getFullYear()}-${String(day.getMonth()+1).padStart(2,'0')}-${String(day.getDate()).padStart(2,'0')}`;
    const daySessions = weekSessions.filter(s=>s.date===ds);
    if(!daySessions.length) continue;

    daySessions.forEach(s=>{
      if(shown>=maxRows) return;
      // 曜日
      x.fillStyle = '#a8a29a';
      x.font = `700 ${isStory?26:21}px -apple-system, "Helvetica Neue", sans-serif`;
      x.fillText(dowLabels[i], padL, y);
      // 時刻 or 時間
      x.fillStyle = '#1a1a1a';
      x.font = `700 ${isStory?38:30}px -apple-system, "Helvetica Neue", sans-serif`;
      const timeLabel = (s.startTime && s.endTime) ? `${s.startTime}–${s.endTime}` : `${s.duration}min`;
      x.fillText(timeLabel, padL + (isStory?76:60), y);
      // 種別（右寄せ）
      x.fillStyle = belt.text;
      x.font = `600 ${isStory?32:26}px -apple-system, "Helvetica Neue", sans-serif`;
      let ty = s.type||'';
      const tw = x.measureText(ty).width;
      const maxTypeW = contentW * 0.36;
      if(tw > maxTypeW){
        while(x.measureText(ty+'…').width > maxTypeW && ty.length>1) ty = ty.slice(0,-1);
        ty += '…';
      }
      x.fillText(ty, padR - x.measureText(ty).width, y);
      y += isStory ? 62 : 48;
      shown++;
    });
  }

  if(weekSessions.length > maxRows){
    x.fillStyle = '#a8a29a';
    x.font = `500 ${isStory?30:24}px -apple-system, "Helvetica Neue", sans-serif`;
    x.fillText(`+${weekSessions.length-maxRows}`, padL, y);
    y += isStory ? 54 : 42;
  }

  // 合計（下部に大きく）
  y = isStory ? H - 560 : H - 330;
  x.strokeStyle = '#e0d9cf';
  x.lineWidth = 2;
  x.beginPath(); x.moveTo(padL, y); x.lineTo(padR, y); x.stroke();
  y += isStory ? 74 : 56;

  x.fillStyle = '#a8a29a';
  x.font = `700 ${isStory?26:21}px -apple-system, "Helvetica Neue", sans-serif`;
  drawTracked(x, t('share_mat_time'), padL, y, isStory?8:7);
  y += isStory ? 28 : 20;

  x.fillStyle = belt.text;
  const bigSize = isStory ? 190 : 140;
  x.font = `800 ${bigSize}px -apple-system, "Helvetica Neue", sans-serif`;
  x.fillText(String(hrs), padL, y + bigSize*0.76);
  const hw = x.measureText(String(hrs)).width;
  x.fillStyle = '#1a1a1a';
  x.font = `700 ${isStory?42:32}px -apple-system, "Helvetica Neue", sans-serif`;
  x.fillText('HRS', padL + hw + (isStory?20:16), y + bigSize*0.76);
  if(mins>0){
    x.fillStyle = '#a8a29a';
    x.font = `600 ${isStory?32:26}px -apple-system, "Helvetica Neue", sans-serif`;
    x.fillText(`${mins} MIN`, padL + hw + (isStory?20:16), y + bigSize*0.76 - (isStory?48:38));
  }

  // 右側に日数
  x.fillStyle = '#a8a29a';
  x.font = `700 ${isStory?24:20}px -apple-system, "Helvetica Neue", sans-serif`;
  const dLabel = t('share_days');
  drawTracked(x, dLabel, padR - (isStory?130:100), y, isStory?6:5);
  x.fillStyle = '#1a1a1a';
  x.font = `800 ${isStory?92:70}px -apple-system, "Helvetica Neue", sans-serif`;
  const dw = x.measureText(String(trainDays)).width;
  x.fillText(String(trainDays), padR - dw, y + (isStory?92:70));

  drawFooter(x, W, H);
}

function drawStatsCard(x, W, H, belt){
  const isStory = shareFormat==='story';
  const padL = isStory ? 108 : 88;
  const padR = W - (isStory ? 84 : 70);
  const contentW = padR - padL;
  let y = isStory ? 210 : 140;

  const now = new Date();
  const yr = now.getFullYear(), mo = now.getMonth();
  const monthSessions = sessions.filter(s=>{
    const d = new Date(s.date);
    return d.getFullYear()===yr && d.getMonth()===mo && s.status==='done';
  });
  const totalMin = monthSessions.reduce((a,b)=>a+(b.duration||0),0);
  const hrs = Math.floor(totalMin/60);
  const mins = totalMin%60;
  const trainDays = new Set(monthSessions.map(s=>s.date)).size;

  x.fillStyle = '#a8a29a';
  x.font = `700 ${isStory?26:22}px -apple-system, "Helvetica Neue", sans-serif`;
  drawTracked(x, t('share_this_month'), padL, y, isStory?8:7);
  y += isStory ? 58 : 46;

  x.fillStyle = '#1a1a1a';
  x.font = `800 ${isStory?86:66}px -apple-system, "Helvetica Neue", sans-serif`;
  x.fillText(`${t('cal_months')[mo]} ${yr}`, padL, y);
  y += isStory ? 36 : 28;

  x.strokeStyle = '#1a1a1a';
  x.lineWidth = 3;
  x.beginPath(); x.moveTo(padL, y); x.lineTo(padL + (isStory?120:96), y); x.stroke();
  y += isStory ? 110 : 84;

  x.fillStyle = '#a8a29a';
  x.font = `700 ${isStory?26:22}px -apple-system, "Helvetica Neue", sans-serif`;
  drawTracked(x, t('share_mat_time'), padL, y, isStory?8:7);
  y += isStory ? 30 : 22;

  x.fillStyle = belt.text;
  const bigSize = isStory ? 260 : 190;
  x.font = `800 ${bigSize}px -apple-system, "Helvetica Neue", sans-serif`;
  x.fillText(String(hrs), padL, y + bigSize*0.76);
  const hw = x.measureText(String(hrs)).width;
  x.fillStyle = '#1a1a1a';
  x.font = `700 ${isStory?46:36}px -apple-system, "Helvetica Neue", sans-serif`;
  x.fillText('HRS', padL + hw + (isStory?22:18), y + bigSize*0.76);
  if(mins>0){
    x.fillStyle = '#a8a29a';
    x.font = `600 ${isStory?38:30}px -apple-system, "Helvetica Neue", sans-serif`;
    x.fillText(`${mins} MIN`, padL + hw + (isStory?22:18), y + bigSize*0.76 - (isStory?54:42));
  }
  y += isStory ? 250 : 180;

  // セッション数と日数を横並び
  y += isStory ? 40 : 30;
  x.fillStyle = '#a8a29a';
  x.font = `700 ${isStory?26:22}px -apple-system, "Helvetica Neue", sans-serif`;
  drawTracked(x, t('share_sessions'), padL, y, isStory?8:7);
  drawTracked(x, t('share_days'), padL + contentW*0.5, y, isStory?8:7);
  y += isStory ? 24 : 18;
  x.fillStyle = '#1a1a1a';
  x.font = `800 ${isStory?110:82}px -apple-system, "Helvetica Neue", sans-serif`;
  x.fillText(String(monthSessions.length), padL, y + (isStory?86:64));
  x.fillText(String(trainDays), padL + contentW*0.5, y + (isStory?86:64));
  y += isStory ? 130 : 96;

  const typeMap = {};
  monthSessions.forEach(s=>{ typeMap[s.type]=(typeMap[s.type]||0)+1; });
  const topTypes = Object.entries(typeMap).sort((a,b)=>b[1]-a[1]).slice(0, isStory?4:3);
  if(topTypes.length){
    y += isStory ? 30 : 20;
    const maxCount = topTypes[0][1];
    topTypes.forEach(([name,count])=>{
      x.fillStyle = '#1a1a1a';
      x.font = `600 ${isStory?36:28}px -apple-system, "Helvetica Neue", sans-serif`;
      let nm = name;
      if(x.measureText(nm).width > contentW*0.55){
        while(x.measureText(nm+'…').width > contentW*0.55 && nm.length>1) nm=nm.slice(0,-1);
        nm+='…';
      }
      x.fillText(nm, padL, y);
      const barY = y + (isStory?14:11);
      const barMaxW = contentW * 0.34;
      const barW = (count/maxCount) * barMaxW;
      x.fillStyle = '#e8e2d8';
      x.fillRect(padR - barMaxW, barY - (isStory?18:14), barMaxW, isStory?10:8);
      x.fillStyle = belt.text;
      x.fillRect(padR - barMaxW, barY - (isStory?18:14), barW, isStory?10:8);
      x.fillStyle = '#a8a29a';
      x.font = `600 ${isStory?28:22}px -apple-system, "Helvetica Neue", sans-serif`;
      x.fillText(String(count), padR + (isStory?14:10), y);
      y += isStory ? 62 : 48;
    });
  }

  drawFooter(x, W, H);
}

function drawTracked(x, text, px, py, tracking){
  let cx = px;
  for(const ch of text){
    x.fillText(ch, cx, py);
    cx += x.measureText(ch).width + tracking;
  }
}

function drawFooter(x, W, H){
  const isStory = shareFormat==='story';
  const padL = isStory ? 108 : 88;
  const fy = H - (isStory ? 110 : 74);
  x.fillStyle = '#c4bdb2';
  x.font = `700 ${isStory?26:21}px -apple-system, "Helvetica Neue", sans-serif`;
  drawTracked(x, 'BJJ LOG', padL, fy, isStory?7:6);
}


applyStaticLabels();
render();
</script>
</body>
</html>
