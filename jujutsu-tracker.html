<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BJJ Log</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="BJJ Log" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23b07d3a'/%3E%3Ctext y='.9em' font-size='75' x='12'%3E🥋%3C/text%3E%3C/svg%3E" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #f5f5f5; color: #1a1a1a; font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; max-width: 720px; margin: 0 auto; padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
    #header { padding: calc(20px + env(safe-area-inset-top)) 20px 0; border-bottom: 1px solid #e0e0e0; background: #fff; position: sticky; top: 0; z-index: 50; }
    #header .logo { font-size: 11px; letter-spacing: 0.2em; color: #aaa; text-transform: uppercase; }
    #header h1 { font-size: 22px; font-weight: 700; margin: 4px 0 0; color: #1a1a1a; letter-spacing: -0.3px; }
    nav { display: flex; overflow-x: auto; }
    nav button { padding: 10px 14px; background: none; border: none; border-bottom: 2px solid transparent; color: #999; font-size: 12px; font-weight: 400; letter-spacing: 0.03em; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    nav button.active { border-bottom-color: #b07d3a; color: #b07d3a; font-weight: 600; }
    .page { padding: 16px; }
    .card { background: #fff; border: 1px solid #e8e8e8; border-radius: 8px; padding: 14px; margin-bottom: 10px; }
    .card.accent { border-color: #b07d3a33; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 8px; padding: 14px; }
    .stat-num { font-size: 28px; font-weight: 700; color: #b07d3a; line-height: 1; }
    .stat-label { font-size: 11px; color: #aaa; margin-top: 4px; letter-spacing: 0.08em; text-transform: uppercase; }
    .section-title { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #aaa; margin-bottom: 10px; margin-top: 0; }
    .session-item { background: #fff; border: 1px solid #e8e8e8; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; }
    .session-date { font-size: 12px; color: #aaa; margin-bottom: 3px; }
    .session-type { font-size: 15px; font-weight: 600; color: #1a1a1a; }
    .session-meta { font-size: 13px; color: #999; }
    .badge { display: inline-block; border-radius: 4px; padding: 2px 8px; font-size: 11px; margin-right: 4px; margin-top: 4px; }
    .badge-brown { background: #b07d3a18; color: #b07d3a; border: 1px solid #b07d3a33; }
    .badge-green { background: #6ea88a18; color: #6ea88a; border: 1px solid #6ea88a33; }
    .badge-blue { background: #6ea8c818; color: #6ea8c8; border: 1px solid #6ea8c833; }
    .badge-gray { background: #88888818; color: #888; border: 1px solid #88888833; }
    .badge-purple { background: #9b7acc18; color: #9b7acc; border: 1px solid #9b7acc33; }
    label.lbl { display: block; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #aaa; margin-bottom: 5px; margin-top: 14px; }
    input, textarea, select { width: 100%; background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; color: #1a1a1a; padding: 9px 12px; font-size: 16px; outline: none; font-family: inherit; }
    textarea { resize: vertical; min-height: 72px; }
    .btn-primary { background: #b07d3a; color: #fff; border: none; border-radius: 6px; padding: 12px 22px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn-secondary { background: none; color: #999; border: 1px solid #e0e0e0; border-radius: 6px; padding: 11px 18px; font-size: 13px; cursor: pointer; }
    .btn-secondary.accent { color: #b07d3a; border-color: #b07d3a33; }
    .btn-secondary.blue { color: #6a8fc8; border-color: #6a8fc833; }
    .btn-light { background: #f0e8da; color: #b07d3a; border: none; border-radius: 6px; padding: 12px 22px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn-danger { background: none; color: #c0504a; border: 1px solid #c0504a33; border-radius: 6px; padding: 8px 14px; font-size: 12px; cursor: pointer; }
    .btn-sm { padding: 7px 14px; font-size: 12px; }
    #fab { position: fixed; bottom: calc(24px + env(safe-area-inset-bottom)); right: 24px; width: 52px; height: 52px; border-radius: 26px; background: #b07d3a; color: #fff; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 4px 20px rgba(176,125,58,0.3); z-index: 100; display: flex; align-items: center; justify-content: center; line-height: 1; }
    .phase-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .phase-tab { flex: 1; padding: 10px 0; background: #fff; color: #999; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 13px; cursor: pointer; }
    .phase-tab.active { background: #b07d3a; color: #fff; border-color: #b07d3a; font-weight: 700; }
    .rating-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .rating-btn { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 8px 12px; font-size: 13px; cursor: pointer; color: #999; }
    .rating-btn.active { background: #b07d3a18; border-color: #b07d3a; color: #b07d3a; }
    .goal-box { border-radius: 6px; padding: 12px; margin-bottom: 10px; }
    .goal-box.brown { background: #b07d3a0d; border: 1px solid #b07d3a2a; }
    .goal-box.red { background: #c0504a0d; border: 1px solid #c0504a2a; }
    .goal-box.green { background: #6ea88a0d; border: 1px solid #6ea88a2a; }
    .goal-box.blue { background: #6ea8c80d; border: 1px solid #6ea8c82a; }
    .detail-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #aaa; margin-bottom: 4px; }
    .detail-value { font-size: 14px; color: #1a1a1a; line-height: 1.5; white-space: pre-wrap; }
    .divider { border-top: 1px solid #ececec; margin: 16px 0; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .flex-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .flex-between { display: flex; justify-content: space-between; align-items: flex-start; }
    #modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
    #modal-box { background: #fff; border-radius: 12px; padding: 24px; max-width: 460px; width: 100%; max-height: 80vh; overflow-y: auto; }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .modal-sub { font-size: 13px; color: #aaa; margin-bottom: 16px; }
    .url-box { background: #f5f5f5; border-radius: 6px; padding: 10px 12px; font-size: 12px; word-break: break-all; color: #555; margin-bottom: 12px; }
    .pending-banner { background: #fff; border: 1px solid #b07d3a44; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
    .pending-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-top: 1px solid #ececec; }
    .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; background: #000; margin-bottom: 10px; }
    .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; border-radius: 8px; }
    .video-link { font-size: 12px; color: #6a8fc8; word-break: break-all; text-decoration: none; }
    /* 技ライブラリ */
    .tech-item { background: #fff; border: 1px solid #e8e8e8; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; }
    .tech-name { font-size: 16px; font-weight: 700; color: #1a1a1a; }
    .tech-count { font-size: 12px; color: #aaa; margin-top: 3px; }
    /* 動画メモ */
    .vmemo-item { background: #fff; border: 1px solid #e8e8e8; border-radius: 8px; padding: 14px; margin-bottom: 10px; }
    .vmemo-title { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
    .vmemo-note { font-size: 13px; color: #666; margin-top: 6px; line-height: 1.5; white-space: pre-wrap; }
    /* フローチャート（グラフ図） */
    .fc-canvas-wrap { background: #faf8f5; border: 1px solid #e8e8e8; border-radius: 10px; overflow: hidden; margin-bottom: 12px; height: 480px; position: relative; touch-action: none; }
    .fc-canvas-inner { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
    .fc-graph-node { position: absolute; box-sizing: border-box; border-radius: 8px; padding: 8px 10px; font-size: 12px; color: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.12); }
    .fc-graph-node .fc-nlabel { font-size: 9px; opacity: 0.9; margin-bottom: 3px; display: flex; align-items: center; gap: 4px; }
    .fc-gn-pos { background: #6ea88a; border: 1px solid #5c9678; }
    .fc-gn-me  { background: #b07d3a; border: 1px solid #9c6d2f; }
    .fc-gn-opp { background: #6ea8c8; border: 1px solid #5c93b3; }
    .fc-legend { display: flex; gap: 14px; margin-bottom: 10px; flex-wrap: wrap; }
    .fc-legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #666; }
    .fc-legend-dot { width: 12px; height: 12px; border-radius: 3px; }
    /* 編集用ツリー */
    .fc-node { border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; border: 1px solid #e8e8e8; background: #fff; }
    .fc-node.me { border-left: 4px solid #b07d3a; background: #b07d3a0a; }
    .fc-node.opp { border-left: 4px solid #6ea8c8; background: #6ea8c80a; }
    .fc-node.start { border-left: 4px solid #6ea88a; background: #6ea88a0a; }
    .fc-children { margin-left: 18px; padding-left: 10px; border-left: 2px dashed #e0e0e0; margin-top: 6px; }
    .fc-actor-badge { font-size: 10px; padding: 1px 7px; border-radius: 4px; font-weight: 600; }
    .fc-actor-me { background: #b07d3a; color: #fff; }
    .fc-actor-opp { background: #6ea8c8; color: #fff; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div id="header">
  <div class="logo">BJJ</div>
  <h1>BJJ Log</h1>
  <nav id="main-nav">
    <button id="nav-dashboard" class="active" onclick="showView('dashboard')">ホーム</button>
    <button id="nav-list" onclick="showView('list')">記録一覧</button>
    <button id="nav-library" onclick="showView('library')">技ライブラリ</button>
    <button id="nav-videos" onclick="showView('videos')">動画メモ</button>
    <button id="nav-flowchart" onclick="showView('flowchart')">フローチャート</button>
  </nav>
</div>
<div id="view-dashboard" class="page"></div>
<div id="view-list" class="page hidden"></div>
<div id="view-detail" class="page hidden"></div>
<div id="view-form" class="page hidden"></div>
<div id="view-library" class="page hidden"></div>
<div id="view-tech-detail" class="page hidden"></div>
<div id="view-videos" class="page hidden"></div>
<div id="view-flowchart" class="page hidden"></div>
<div id="view-flowchart-detail" class="page hidden"></div>
<button id="fab" onclick="onFab()">＋</button>
<div id="modal-bg" class="hidden"><div id="modal-box"></div></div>

<script>

const STORAGE_KEY = 'jujutsu_sessions';
const VMEMO_KEY   = 'jujutsu_vmemos';
const FLOWCHART_KEY = 'jujutsu_flowcharts';
const POSITIONS = ['マウント','バック','ガード','ハーフガード','サイドコントロール','ニーオンベリー','タートル','スタンド'];
const RATING_LABELS = ['😞 最悪','😕 イマイチ','😐 普通','🙂 良い','😄 最高'];
const SESSION_TYPES = ['スパーリング','クラス','テクニック','ドリル','試合','セルフトレーニング','ノーギ','武器術'];

let sessions = [];
let vmemos = []; // 参考動画メモ
let currentView = 'dashboard';
let editingId = null;
let formPhase = 'pre';
let selectedSessionId = null;
let selectedTechName = null;
let filterTag = '';
let form = newForm();
let vmemoForm = { title:'', url:'', note:'', tags:[], category:'' };
let editingVmemoId = null;
let vmemoFilter = '';
let flowcharts = []; // 柔術フローチャート
let selectedFlowchartId = null;

function newForm() {
  return { id:Date.now(), date:new Date().toISOString().split('T')[0], type:'スパーリング', duration:60, startTime:'', endTime:'', partner:'', goal:'', preCondition:'', preInjuries:'', content:'', techniques:[], sparringNotes:'', submissions_got:0, submissions_given:0, corrections:'', reinforcements:'', rating:3, injuries:'', nextGoal:'', tags:[], status:'pre', videoUrls:[] };
}

function load() {
  try { const s = localStorage.getItem(STORAGE_KEY); if(s) sessions=JSON.parse(s); } catch{}
  try { const v = localStorage.getItem(VMEMO_KEY);   if(v) vmemos=JSON.parse(v);   } catch{}
  try { const fc = localStorage.getItem(FLOWCHART_KEY); if(fc) flowcharts=JSON.parse(fc); } catch{}
  // 既存データに紛れ込んだ<br>を改行に戻す（1回限りのクリーンアップ）
  cleanBrTags();
}
function cleanBrTags(){
  const fix=(v)=> typeof v==='string' ? v.replace(/<br\s*\/?>/gi, '\n') : v;
  let changed=false;
  sessions.forEach(s=>{
    ['goal','preCondition','preInjuries','content','sparringNotes','corrections','reinforcements','nextGoal','injuries'].forEach(k=>{
      if(typeof s[k]==='string' && /<br/i.test(s[k])){ s[k]=fix(s[k]); changed=true; }
    });
    (s.techniques||[]).forEach(t=>{ if(typeof t.notes==='string' && /<br/i.test(t.notes)){ t.notes=fix(t.notes); changed=true; } });
  });
  vmemos.forEach(v=>{ if(typeof v.note==='string' && /<br/i.test(v.note)){ v.note=fix(v.note); changed=true; } });
  if(changed){ save(); saveVmemos(); }
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions)); } catch{}
}
function saveVmemos() {
  try { localStorage.setItem(VMEMO_KEY, JSON.stringify(vmemos)); } catch{}
}
function saveFlowcharts() {
  try { localStorage.setItem(FLOWCHART_KEY, JSON.stringify(flowcharts)); } catch{}
}
load();

// ── ナビ ──
const ALL_VIEWS = ['dashboard','list','detail','form','library','tech-detail','videos','flowchart','flowchart-detail'];
function showView(v) {
  ALL_VIEWS.forEach(x => document.getElementById('view-'+x).classList.toggle('hidden', x!==v));
  const nav = document.getElementById('main-nav');
  const fab = document.getElementById('fab');
  if (v==='form') { nav.classList.add('hidden'); fab.classList.add('hidden'); }
  else { nav.classList.remove('hidden'); fab.classList.remove('hidden'); }
  ['dashboard','list','library','videos','flowchart'].forEach(x => {
    const btn = document.getElementById('nav-'+x);
    if(btn) btn.classList.toggle('active', x===v || (v==='detail'&&x==='list') || (v==='tech-detail'&&x==='library') || (v==='flowchart-detail'&&x==='flowchart'));
  });
  currentView = v;
  render();
}

function onFab() {
  if (currentView==='videos') startNewVmemo();
  else if (currentView==='flowchart') startNewFlowchart();
  else startNew();
}

function render() {
  if(currentView==='dashboard')   renderDashboard();
  if(currentView==='list')        renderList();
  if(currentView==='detail')      renderDetail();
  if(currentView==='form')        renderForm();
  if(currentView==='library')     renderLibrary();
  if(currentView==='tech-detail') renderTechDetail();
  if(currentView==='videos')      renderVideos();
  if(currentView==='flowchart')   renderFlowchartList();
  if(currentView==='flowchart-detail') renderFlowchartDetail();
}

function badge(text,cls){ return `<span class="badge ${cls}">${text}</span>`; }
function goalBox(label,text,cls){ if(!text) return ''; return `<div class="goal-box ${cls}"><div class="detail-label">${label}</div><div class="detail-value">${esc(text)}</div></div>`; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escBr(s){ return esc(s).replace(/\n/g,'<br>'); }

function getEmbedHtml(url) {
  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([\w-]+)/);
  if(yt) return `<div class="video-wrapper"><iframe src="https://www.youtube.com/embed/${yt[1]}?controls=1&modestbranding=1&rel=0" allowfullscreen></iframe></div>`;
  const gd = url.match(/drive\.google\.com\/file\/d\/([\w-]+)/);
  if(gd) return `<div class="video-wrapper"><iframe src="https://drive.google.com/file/d/${gd[1]}/preview" allowfullscreen></iframe></div>`;
  const vi = url.match(/vimeo\.com\/(\d+)/);
  if(vi) return `<div class="video-wrapper"><iframe src="https://player.vimeo.com/video/${vi[1]}" allowfullscreen></iframe></div>`;
  return null;
}

// ── DASHBOARD ──
let calendarYear = new Date().getFullYear();
let calendarMonth = new Date().getMonth(); // 0-indexed

function renderDashboard() {
  const done=sessions.filter(s=>s.status==='done'), pending=sessions.filter(s=>s.status==='pre');
  const totalMin=sessions.reduce((a,b)=>a+(b.duration||0),0);
  const avgR=done.length?(done.reduce((a,b)=>a+(b.rating||3),0)/done.length).toFixed(1):'—';
  let html='';

  if(pending.length){
    html+=`<div class="pending-banner"><p class="section-title" style="margin-bottom:8px">練習後の記録が未完了</p>`;
    pending.forEach(s=>{ html+=`<div class="pending-row"><div><span style="font-size:13px">${esc(s.date)} ${esc(s.type)}</span>${s.goal?`<div style="font-size:11px;color:#aaa">目標: ${esc(s.goal)}</div>`:''}</div><button class="btn-primary btn-sm" onclick="startEdit(${s.id},'post')">練習後を記録</button></div>`; });
    html+=`</div>`;
  }

  // カレンダー
  html += renderCalendarHtml(calendarYear, calendarMonth);

  html+=`<div class="stat-grid">
    <div class="stat-card"><div class="stat-num">${done.length}</div><div class="stat-label">完了した練習</div></div>
    <div class="stat-card"><div class="stat-num">${Math.floor(totalMin/60)}h</div><div class="stat-label">総練習時間</div></div>
    <div class="stat-card"><div class="stat-num">${pending.length}</div><div class="stat-label">記録待ち</div></div>
    <div class="stat-card"><div class="stat-num">${avgR}</div><div class="stat-label">平均コンディション</div></div>
  </div>`;

  html+=`<p class="section-title">最近の練習</p>`;
  const recent=sessions.slice(0,5);
  if(!recent.length) html+=`<div class="card" style="text-align:center;padding:32px"><div style="font-size:32px;margin-bottom:12px">🥋</div><div style="color:#aaa;font-size:14px">右下の＋ボタンで記録を追加しましょう</div></div>`;
  recent.forEach(s=>{ html+=sessionItemHtml(s); });
  document.getElementById('view-dashboard').innerHTML=html;
}

function renderCalendarHtml(year, month) {
  const monthNames=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];

  // 練習した日をSetで管理（date文字列）
  const trainingDates = new Set(sessions.map(s=>s.date));

  // 月の最初の日・最後の日
  const firstDay = new Date(year, month, 1);
  const lastDay  = new Date(year, month+1, 0);

  // 月曜始まり：firstDayの曜日（0=日〜6=土 → 月始まりに変換）
  let startDow = firstDay.getDay(); // 0=日
  startDow = (startDow === 0) ? 6 : startDow - 1; // 月=0, 火=1, ..., 日=6

  const daysInMonth = lastDay.getDate();

  let cal = `<div class="card" style="margin-bottom:14px;padding:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <button onclick="calPrev()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#b07d3a;padding:0 8px">‹</button>
      <div style="font-weight:700;font-size:15px">${year}年 ${monthNames[month]}</div>
      <button onclick="calNext()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#b07d3a;padding:0 8px">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center">`;

  // 曜日ヘッダー（月〜日）
  const dowLabels = ['月','火','水','木','金','土','日'];
  dowLabels.forEach((d, i) => {
    const color = i===5 ? '#6ea8c8' : i===6 ? '#c0504a' : '#aaa';
    cal += `<div style="font-size:11px;color:${color};padding:4px 0;font-weight:600">${d}</div>`;
  });

  // 空白セル（月曜始まりのオフセット）
  for(let i=0; i<startDow; i++){
    cal += `<div></div>`;
  }

  // 日付セル
  for(let d=1; d<=daysInMonth; d++){
    const mm = String(month+1).padStart(2,'0');
    const dd = String(d).padStart(2,'0');
    const dateStr = `${year}-${mm}-${dd}`;
    const hasTrain = trainingDates.has(dateStr);
    const isToday  = dateStr === todayStr;

    const dow = (startDow + d - 1) % 7; // 0=月〜6=日
    const textColor = dow===5 ? '#6ea8c8' : dow===6 ? '#c0504a' : '#1a1a1a';

    let cellStyle = `font-size:12px;padding:2px 0;border-radius:6px;cursor:${hasTrain?'pointer':'default'}`;
    if(isToday) cellStyle += ';background:#b07d3a18;border:1.5px solid #b07d3a';

    cal += `<div style="${cellStyle}" ${hasTrain?`onclick="calDayTap('${dateStr}')"`:''}>
      <div style="color:${textColor};font-weight:${isToday?700:400}">${d}</div>
      <div style="font-size:14px;line-height:1">${hasTrain?'🥋':''}</div>
    </div>`;
  }

  cal += `</div></div>`;
  return cal;
}

function calPrev(){
  calendarMonth--;
  if(calendarMonth<0){ calendarMonth=11; calendarYear--; }
  renderDashboard();
}
function calNext(){
  calendarMonth++;
  if(calendarMonth>11){ calendarMonth=0; calendarYear++; }
  renderDashboard();
}
function calDayTap(dateStr){
  // その日の練習一覧へ
  filterTag='';
  showView('list');
  // 日付でフィルタ（一時的にsessionsをその日に絞って表示）
  const el=document.getElementById('view-list');
  if(!el) return;
  const daySessions=sessions.filter(s=>s.date===dateStr);
  let html=`<div style="margin-bottom:12px"><button class="btn-secondary btn-sm" onclick="showView('list')">← 全て表示</button> <span style="font-size:13px;color:#aaa;margin-left:8px">${dateStr}</span></div>`;
  if(!daySessions.length) html+=`<div style="color:#aaa;text-align:center;margin-top:40px">この日の記録なし</div>`;
  daySessions.forEach(s=>{ html+=sessionItemHtml(s); });
  el.innerHTML=html;
}

function sessionItemHtml(s){

// ── LIBRARY ──
function renderLibrary(){
  // 全セッションから技を集約
  const techMap = {};
  sessions.forEach(s=>{
    (s.techniques||[]).forEach(t=>{
      if(!t.name) return;
      if(!techMap[t.name]) techMap[t.name]={ name:t.name, count:0, positions:new Set(), lastDate:'' };
      techMap[t.name].count++;
      if(t.position) techMap[t.name].positions.add(t.position);
      if(s.date > techMap[t.name].lastDate) techMap[t.name].lastDate=s.date;
    });
  });
  const techs = Object.values(techMap).sort((a,b)=>b.count-a.count);
  let html=`<p class="section-title">技 (${techs.length}種類)</p>`;
  if(!techs.length) html+=`<div class="card" style="text-align:center;padding:32px"><div style="font-size:32px;margin-bottom:12px">🥋</div><div style="color:#aaa;font-size:14px">練習記録に技を追加すると<br>ここに自動でまとめられます</div></div>`;

  document.getElementById('view-library').innerHTML=html;
}

function renderVideos(){
  const categories=[...new Set(vmemos.map(v=>v.category).filter(Boolean))].sort();
  const filtered = vmemoFilter ? vmemos.filter(v=>v.category===vmemoFilter) : vmemos;

  let html='';

  // カテゴリフィルターバー
  if(categories.length){
    html+=`<div style="margin-bottom:14px;display:flex;flex-wrap:wrap;gap:6px">
      <span class="badge ${vmemoFilter?'badge-gray':'badge-brown'}" style="cursor:pointer;font-size:12px;padding:4px 10px" onclick="setVmemoFilter('')">すべて</span>
      ${categories.map(c=>`<span class="badge ${vmemoFilter===c?'badge-purple':'badge-gray'}" style="cursor:pointer;font-size:12px;padding:4px 10px" onclick="setVmemoFilter('${esc(c)}')">${esc(c)}</span>`).join('')}
    </div>`;

  // カテゴリ別グループ表示
  if(vmemoFilter){
    // 絞り込み中：フラットに表示
    html+=`<p class="section-title">${esc(vmemoFilter)} (${filtered.length}件)</p>`;
    if(!filtered.length) html+=`<div style="color:#aaa;text-align:center;margin-top:20px;font-size:14px">動画メモなし</div>`;
    filtered.forEach(v=>{ html+=vmemoItemHtml(v); });
  } else {
    // 全表示：カテゴリごとにグループ化
    const uncategorized = vmemos.filter(v=>!v.category);
    // カテゴリ別
    categories.forEach(cat=>{
      const items=vmemos.filter(v=>v.category===cat);
      html+=`<div style="margin-bottom:4px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <p class="section-title" style="margin:0">${esc(cat)} (${items.length}件)</p>
          <span class="badge badge-purple" style="cursor:pointer" onclick="setVmemoFilter('${esc(cat)}')">絞り込む</span>
        </div>
        ${items.map(v=>vmemoItemHtml(v)).join('')}
      </div>`;
    });
    if(uncategorized.length){
      html+=`<p class="section-title" style="margin-top:8px">カテゴリなし (${uncategorized.length}件)</p>`;
      uncategorized.forEach(v=>{ html+=vmemoItemHtml(v); });
    }
    if(!vmemos.length) html+=`<div class="card" style="text-align:center;padding:32px"><div style="font-size:32px;margin-bottom:12px">🎬</div><div style="color:#aaa;font-size:14px">右下の＋ボタンで参考動画を追加しましょう</div></div>`;
  }

  document.getElementById('view-videos').innerHTML=html;
}

function setFormPhase(p){
  const fields=[['f-date','date','s'],['f-type','type','s'],['f-startTime','startTime','s'],['f-endTime','endTime','s'],['f-duration','duration','n'],['f-partner','partner','s'],['f-goal','goal','s'],['f-preCondition','preCondition','s'],['f-preInjuries','preInjuries','s'],['f-content','content','s'],['f-sparringNotes','sparringNotes','s']];
  fields.forEach(([id,key,t])=>{ const el=document.getElementById(id); if(el) form[key]=t==='n'?+el.value:el.value; });
  formPhase=p; renderForm();
}

function syncDurationFromTimes(){
  const stEl=document.getElementById('f-startTime');
  const etEl=document.getElementById('f-endTime');
  if(!stEl || !etEl) return;
  const st=stEl.value;
  const et=etEl.value;
  if(st && et && st.includes(':') && et.includes(':')){
    const stParts=st.split(':');
    const etParts=et.split(':');
    const sh=parseInt(stParts[0],10), sm=parseInt(stParts[1],10);
    const eh=parseInt(etParts[0],10), em=parseInt(etParts[1],10);
    if(isNaN(sh)||isNaN(sm)||isNaN(eh)||isNaN(em)) return;
    let mins=(eh*60+em)-(sh*60+sm);
    if(mins<=0) mins+=24*60; // 日付を跨ぐ場合（深夜練習など）
    form.duration=mins;
    form.startTime=st;
    form.endTime=et;
    const durEl=document.getElementById('f-duration');
    if(durEl) durEl.value=mins;
  }
}

function savePre(){
  // フォームの現在値を同期
  const syncFields=[['f-date','date','s'],['f-type','type','s'],['f-startTime','startTime','s'],['f-endTime','endTime','s'],['f-duration','duration','n'],['f-partner','partner','s'],['f-goal','goal','s'],['f-preCondition','preCondition','s'],['f-preInjuries','preInjuries','s']];
  syncFields.forEach(([id,key,t])=>{ const el=document.getElementById(id); if(el) form[key]=t==='n'?+el.value:el.value; });
  if(editingId){
    // 既存セッションを更新（status は pre のまま）
    sessions=sessions.map(x=>x.id===editingId?{...form,status:'pre'}:x);
  } else {
    // 新規：IDを確定させてから追加
    const newId=Date.now();
    form.id=newId;
    sessions=[{...form,status:'pre'},...sessions];
    editingId=newId;
  }
  save(); showView('list');
}
function savePost(){
  // 全フィールドをIDで確実に同期
  const syncFields=[
    ['f-content','content','s'],
    ['f-sparringNotes','sparringNotes','s'],
    ['f-corrections','corrections','s'],
    ['f-reinforcements','reinforcements','s'],
    ['f-nextGoal','nextGoal','s'],
    ['f-injuries','injuries','s'],
  ];
  syncFields.forEach(([id,key])=>{ const el=document.getElementById(id); if(el) form[key]=el.value; });
  // 技のinput値をDOMから確実に同期
  (form.techniques||[]).forEach((t,i)=>{
    const nameEl=document.getElementById('tech-name-'+i);
    const posEl=document.getElementById('tech-pos-'+i);
    const notesEl=document.getElementById('tech-notes-'+i);
    if(nameEl) t.name=nameEl.value;
    if(posEl) t.position=posEl.value;
    if(notesEl) t.notes=notesEl.value;
  });
  if(editingId){
    sessions=sessions.map(x=>x.id===editingId?{...form,status:'done'}:x);
  } else {
    const newId=Date.now();
    form.id=newId;
    sessions=[{...form,status:'done'},...sessions];
  }
  editingId=null; form=newForm(); save(); showView('list');
}

function countNodes(nodes){
  let c=0;
  (nodes||[]).forEach(n=>{ c++; c+=countNodes(n.children); });
  return c;
}

function openFlowchart(id){ selectedFlowchartId=id; showView('flowchart-detail'); }
function getFlowchart(){ return flowcharts.find(f=>f.id===selectedFlowchartId); }

function findNode(nodes, id){
  for(const n of nodes){
    if(n.id===id) return n;
    const found=findNode(n.children, id);
    if(found) return found;
  }
  return null;
}
function findParentArray(nodes, id){
  for(const n of nodes){
    if(n.children.some(c=>c.id===id)) return n.children;
    const found=findParentArray(n.children, id);
    if(found) return found;
  }
  return null;
}

// ── グラフ図の描画 ──
function renderFlowchartGraph(fc){
  // レイアウト計算：各ノードにx,y座標を割り当てる
  const NODE_W=130, NODE_H=52, H_GAP=20, V_GAP=42;

  // ルート（開始ポジション）を仮想ノードとして扱う
  const root={ id:'__root__', actor:'pos', move:fc.startPosition||'開始', children:fc.nodes };

  // 各サブツリーの幅を計算（葉の数ベース）
  function calcWidth(node){
    if(!node.children || !node.children.length){ node._w=NODE_W; return NODE_W; }
    let total=0;
    node.children.forEach(c=>{ total+=calcWidth(c); });
    total+=(node.children.length-1)*H_GAP;
    node._w=Math.max(NODE_W, total);
    return node._w;
  }
  calcWidth(root);

  // x,y座標を割り当て
  const positioned=[];
  function assign(node, xLeft, depth){
    const y=depth*(NODE_H+V_GAP);
    const cx=xLeft + node._w/2; // このサブツリーの中心
    node._x=cx - NODE_W/2;
    node._y=y;
    positioned.push(node);
    if(node.children && node.children.length){
      let childX=xLeft;
      // 子の合計幅がサブツリー幅より小さい場合は中央寄せ
      let childrenTotal=0;
      node.children.forEach(c=>{ childrenTotal+=c._w; });
      childrenTotal+=(node.children.length-1)*H_GAP;
      childX = cx - childrenTotal/2;
      node.children.forEach(c=>{
        assign(c, childX, depth+1);
        childX += c._w + H_GAP;
      });
    }
  }
  assign(root, 0, 0);

  // 全体サイズ
  let maxX=0, maxY=0;
  positioned.forEach(n=>{ maxX=Math.max(maxX, n._x+NODE_W); maxY=Math.max(maxY, n._y+NODE_H); });
  const totalW=maxX+20, totalH=maxY+20;

  // SVGの線
  let lines='';
  positioned.forEach(n=>{
    if(n.children){
      n.children.forEach(c=>{
        const x1=n._x+NODE_W/2, y1=n._y+NODE_H;
        const x2=c._x+NODE_W/2, y2=c._y;
        const midY=(y1+y2)/2;
        const color=c.actor==='me'?'#b07d3a':'#6ea8c8';
        lines+=`<path d="M${x1},${y1} C${x1},${midY} ${x2},${midY} ${x2},${y2}" stroke="${color}" stroke-width="2.5" fill="none" opacity="0.85"/>`;
        // 矢印
        lines+=`<polygon points="${x2-4},${y2-6} ${x2+4},${y2-6} ${x2},${y2}" fill="${color}" opacity="1"/>`;
      });
    }
  });

  // ノードのHTML（絶対配置）
  let nodesHtml='';
  positioned.forEach(n=>{
    let cls, label;
    if(n.id==='__root__'){ cls='fc-gn-pos'; label='◇ ポジション'; }
    else if(n.actor==='me'){ cls='fc-gn-me'; label='🡅 自分'; }
    else { cls='fc-gn-opp'; label='🡇 相手'; }
    nodesHtml+=`<div class="fc-graph-node ${cls}" style="left:${n._x}px;top:${n._y}px;width:${NODE_W}px;min-height:${NODE_H}px">
      <div class="fc-nlabel">${label}</div>
      <div style="font-weight:600;line-height:1.25">${esc(n.move||'（未入力）')}</div>
    </div>`;
  });

  return `<div class="fc-canvas-wrap" id="fc-canvas">
    <div class="fc-canvas-inner" id="fc-canvas-inner" style="width:${totalW}px;height:${totalH}px">
      <svg style="position:absolute;top:0;left:0;width:${totalW}px;height:${totalH}px;pointer-events:none">${lines}</svg>
      ${nodesHtml}
    </div>
  </div>
  <div style="font-size:12px;color:#aaa;text-align:center">2本指でピンチ拡大縮小 · 1本指でドラッグ移動</div>`;
}

// ピンチズーム＆パンのセットアップ
let fcZoom={ scale:1, tx:20, ty:20 };
function setupPinchZoom(){
  const canvas=document.getElementById('fc-canvas');
  const inner=document.getElementById('fc-canvas-inner');
  if(!canvas || !inner) return;

  // 初期表示：全体が収まるように自動フィット
  const cw=canvas.clientWidth, ch=canvas.clientHeight;
  const iw=inner.offsetWidth, ih=inner.offsetHeight;
  const fitScale=Math.min(cw/(iw+40), ch/(ih+40), 1);
  fcZoom={ scale:fitScale, tx:(cw-iw*fitScale)/2, ty:20 };
  applyZoom();

  let startDist=0, startScale=1;
  let startX=0, startY=0, startTx=0, startTy=0;
  let mode=null; // 'pan' | 'pinch'
  let midStart={x:0,y:0};

  function dist(t1,t2){ return Math.hypot(t1.clientX-t2.clientX, t1.clientY-t2.clientY); }

  canvas.ontouchstart=(e)=>{
    if(e.touches.length===2){
      mode='pinch';
      startDist=dist(e.touches[0],e.touches[1]);
      startScale=fcZoom.scale;
      const rect=canvas.getBoundingClientRect();
      midStart={ x:(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left, y:(e.touches[0].clientY+e.touches[1].clientY)/2-rect.top };
      // ピンチ中心のcanvas内座標を基準に
      startTx=fcZoom.tx; startTy=fcZoom.ty;
    } else if(e.touches.length===1){
      mode='pan';
      startX=e.touches[0].clientX; startY=e.touches[0].clientY;
      startTx=fcZoom.tx; startTy=fcZoom.ty;
    }
  };
  canvas.ontouchmove=(e)=>{
    e.preventDefault();
    if(mode==='pinch' && e.touches.length===2){
      const d=dist(e.touches[0],e.touches[1]);
      let newScale=startScale*(d/startDist);
      newScale=Math.max(0.2, Math.min(3, newScale));
      // ピンチ中心を固定してズーム
      const ratio=newScale/startScale;
      fcZoom.tx = midStart.x - (midStart.x - startTx)*ratio;
      fcZoom.ty = midStart.y - (midStart.y - startTy)*ratio;
      fcZoom.scale=newScale;
      applyZoom();
    } else if(mode==='pan' && e.touches.length===1){
      fcZoom.tx = startTx + (e.touches[0].clientX-startX);
      fcZoom.ty = startTy + (e.touches[0].clientY-startY);
      applyZoom();
    }
  };
  canvas.ontouchend=(e)=>{
    if(e.touches.length===0) mode=null;
    else if(e.touches.length===1){ mode='pan'; startX=e.touches[0].clientX; startY=e.touches[0].clientY; startTx=fcZoom.tx; startTy=fcZoom.ty; }
  };
}

function applyZoom(){
  const inner=document.getElementById('fc-canvas-inner');
  if(inner) inner.style.transform=`translate(${fcZoom.tx}px,${fcZoom.ty}px) scale(${fcZoom.scale})`;
}

function renderNodes(nodes){
  if(!nodes || !nodes.length) return '';
  let html='';
  nodes.forEach(n=>{
    const actorClass=n.actor==='me'?'me':'opp';
    const actorBadge=n.actor==='me'?'<span class="fc-actor-badge fc-actor-me">自分</span>':'<span class="fc-actor-badge fc-actor-opp">相手</span>';
    html+=`<div class="fc-node ${actorClass}">
      <div style="margin-bottom:6px">${actorBadge}</div>
      <input type="text" value="${esc(n.move)}" placeholder="動き・技（例: 腕を差し込む）" oninput="updateNode(${n.id},'move',this.value)" style="font-size:14px;margin-bottom:4px" />
      <input type="text" value="${esc(n.notes)}" placeholder="メモ（任意）" oninput="updateNode(${n.id},'notes',this.value)" style="font-size:13px;color:#666" />
      <div class="flex-row" style="margin-top:8px;gap:6px">
        <button class="btn-secondary btn-sm accent" onclick="addNode(${n.id},'me')">＋自分</button>
        <button class="btn-secondary btn-sm blue" onclick="addNode(${n.id},'opp')">＋相手</button>
        <button class="btn-danger" style="padding:5px 10px;font-size:11px" onclick="deleteNode(${n.id})">削除</button>
      </div>
      ${n.children && n.children.length?`<div class="fc-children">${renderNodes(n.children)}</div>`:''}
    </div>`;
  });
  return html;
}

function updateFlowchartField(field, value){
  const fc=getFlowchart(); if(!fc) return;
  fc[field]=value;
  saveFlowcharts();
}
function updateNode(nodeId, field, value){
  const fc=getFlowchart(); if(!fc) return;
  const node=findNode(fc.nodes, nodeId);
  if(node){ node[field]=value; saveFlowcharts(); }
}
function addNode(parentId, actor){
  const fc=getFlowchart(); if(!fc) return;
  const node=newNode(actor);
  if(parentId===null){ fc.nodes.push(node); }
  else { const parent=findNode(fc.nodes, parentId); if(parent) parent.children.push(node); }
  saveFlowcharts();
  renderFlowchartDetail();
}
function deleteNode(nodeId){
  const fc=getFlowchart(); if(!fc) return;
  if(!confirm('この動き（以下の枝も含む）を削除しますか？')) return;
  const rootIdx=fc.nodes.findIndex(n=>n.id===nodeId);
  if(rootIdx>=0){ fc.nodes.splice(rootIdx,1); }
  else { const arr=findParentArray(fc.nodes, nodeId); if(arr){ const i=arr.findIndex(n=>n.id===nodeId); if(i>=0) arr.splice(i,1); } }
  saveFlowcharts();
  renderFlowchartDetail();
}
function deleteFlowchart(id){
  if(!confirm('このフローチャートを削除しますか？')) return;
  flowcharts=flowcharts.filter(f=>f.id!==id);
  saveFlowcharts();
  showView('flowchart');
}


render();
</script>
</body>
</html>
